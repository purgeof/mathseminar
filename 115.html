<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>115學年度研習與命題輪值系統</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        /* ==========================================================================
           1. 全域樣式設定 (字體基準 16px，極致精簡間距)
           ========================================================================== */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --table-bg: #252525;
            --primary-blue: #3498db;
            --accent-purple: #9b59b6;
            --success-green: #2ecc71;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft JhengHei", sans-serif; 
        }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            padding: 6px; /* 再次縮减外邊距，留給內容更多空間 */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-size: 16px; /* 主文字保持 16px */
        }
        
        .container { 
            width: 100%; 
            max-width: 1000px; 
        }

        .header-title { 
            background-color: #2a2a2a; 
            text-align: center; 
            padding: 8px; 
            font-size: 18px; 
            font-weight: bold; 
            border-radius: 6px; 
            margin-bottom: 6px; 
        }
        
        .sync-status { 
            display: block; 
            width: fit-content; 
            margin: 0 auto 10px auto; 
            padding: 3px 10px; 
            border-radius: 20px; 
            font-size: 13px; 
            font-weight: 500; 
        }
        .sync-loading { background: #333; color: #888; }
        .sync-success { background: #10b981; color: white; box-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }

        /* 主功能頁籤 (全體/個人) */
        .tab-system { 
            display: flex; 
            gap: 6px; 
            margin-bottom: 10px; 
        }
        .tab-btn { 
            flex: 1; 
            padding: 8px; 
            background: #333; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
        }
        .tab-btn.active { background: var(--primary-blue); }

        .page-content { display: none; }
        .page-content.active { display: block; }

        /* 下拉選單區塊 */
        .select-container { 
            margin-bottom: 10px; 
            font-size: 16px; 
        }
        .select-input { 
            background: #1a1a1a; 
            color: white; 
            border: 1px solid var(--primary-blue); 
            padding: 6px 8px; 
            border-radius: 6px; 
            width: 100%; 
            max-width: 400px; 
            outline: none; 
            font-size: 16px; 
            margin-top: 4px;
        }

        /* 功能按鈕組 */
        .sub-tab-container { 
            display: flex; 
            gap: 6px; 
            margin-bottom: 10px; 
        }
        .sub-tab-btn { 
            flex: 1;
            padding: 8px; 
            background: #333; 
            color: #ccc; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            text-align: center;
        }
        .sub-tab-btn.active[data-type="study"] { background: #2980b9; color: white; }
        .sub-tab-btn.active[data-type="exam"] { background: var(--accent-purple); color: white; }

        /* 三個年份切換標籤：核心修正，強制排成一列且平分寬度 */
        .phase-tab-container {
            display: flex;
            width: 100%;
            gap: 4px; /* 精簡間距 */
            margin-bottom: 10px;
        }
        .phase-tab-btn {
            flex: 1; /* 平分剩餘空間，確保絕對排在同一行 */
            padding: 6px 2px; /* 大幅縮小左右 padding 避免擠壓換行 */
            background: #2a2a2a;
            color: #bbb;
            border: 1px solid #3d3d3d;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px; /* 優化手機上的顯示字體大小 */
            font-weight: bold;
            text-align: center;
            white-space: nowrap; /* 強制不折行 */
        }
        .phase-tab-btn.active {
            background: var(--accent-purple);
            color: white;
            border-color: var(--accent-purple);
        }

        /* 統計卡片佈局 */
        .mini-summary-row { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 4px; 
            margin-bottom: 10px; 
        }
        .mini-card { 
            background: #242424; 
            border: 1px solid #2d2d2d; 
            border-radius: 6px; 
            padding: 6px 4px; 
            text-align: center; 
        }
        .mini-card .label { font-size: 13px; color: #888; margin-bottom: 2px; }
        .mini-card .value { font-size: 16px; font-weight: bold; }

        /* ==========================================================================
           2. 響應式表格外殼 (自適應寬度，消除滑動條)
           ========================================================================== */
        .table-responsive-wrapper { 
            width: 100%; 
            overflow-x: hidden; /* 在大螢幕預設隱藏滾動 */
            border-radius: 6px;
            border: 1px solid #2d2d2d;
            margin-top: 4px;
            background: #242424;
        }

        .main-table, .detail-table, .matrix-table { 
            width: 100%; 
            border-collapse: collapse; 
            table-layout: fixed; /* 鎖定各欄寬度均分，防範撐開破版 */
        }
        
        .main-table th, .detail-table th, .matrix-table th { 
            background: #2d2d2d; 
            color: var(--primary-blue); 
            padding: 6px 4px; 
            font-size: 15px; 
            font-weight: bold;
            border: 1px solid #333;
        }
        
        .main-table td, .detail-table td, .matrix-table td { 
            padding: 6px 4px; 
            text-align: center; 
            border-bottom: 1px solid #2d2d2d; 
            border-right: 1px solid #2d2d2d;
            font-size: 15px; 
        }

        /* 命題矩陣特定樣式 */
        .matrix-table th { color: var(--primary-blue); }
        .bg-duty { background: #1a252f; } 
        .cell-content { 
            display: flex; 
            flex-direction: column; /* 手機版名字與數字上下排列，極致節省橫向空間 */
            align-items: center; 
            justify-content: center; 
            gap: 1px; 
        }
        .count-badge { color: #f39c12; font-weight: bold; font-size: 12px; }
        .highlight-teacher { background: var(--accent-purple); color: white; border-radius: 4px; padding: 1px 3px; font-weight: bold; font-size: 14px; }

        /* 研習明細公文圖片 */
        .doc-thumbnail { 
            width: 32px; 
            height: 32px; 
            border-radius: 4px; 
            object-fit: cover; 
            border: 1px solid #444; 
            cursor: pointer; 
            vertical-align: middle; 
        }

        /* 區塊小標題 */
        .section-title {
            font-size: 15px; 
            font-weight: bold; 
            border-left: 4px solid #3498db; 
            padding-left: 6px; 
            margin: 10px 0 4px 0;
        }

        /* ==========================================================================
           3. 移動端與平板自適應樣式 (RWD 核心)
           ========================================================================== */
        /* 針對小螢幕手機的極致壓縮，確保不滑動 */
        @media screen and (max-width: 480px) {
            body { padding: 4px; }
            .main-table th, .main-table td,
            .detail-table th, .detail-table td,
            .matrix-table th, .matrix-table td {
                font-size: 14px; /* 手機端表格字體微調，確保 5 欄完美塞入不滑動 */
                padding: 6px 2px;
            }
            .phase-tab-btn { font-size: 13px; } /* 三個年份按鈕字體調小 */
        }

        /* 當螢幕大於平板或桌面端時，放寬間距並調整布局 */
        @media screen and (min-width: 600px) {
            body { padding: 15px; font-size: 16px; }
            .header-title { padding: 12px; font-size: 22px; margin-bottom: 10px; }
            .mini-summary-row { grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
            .mini-card { padding: 8px; }
            .mini-card .value { font-size: 18px; }
            .phase-tab-btn { font-size: 16px; padding: 8px; }
            .main-table th, .detail-table th, .matrix-table th { padding: 10px; font-size: 16px; }
            .main-table td, .detail-table td, .matrix-table td { padding: 10px; font-size: 16px; }
            .cell-content { flex-direction: row; gap: 4px; } /* 寬螢幕下名字與數字恢復橫向排列 */
            .count-badge { font-size: 14px; }
            .table-responsive-wrapper { overflow-x: auto; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-title">115學年度</div>
        <div id="syncIndicator" class="sync-status sync-loading">正在同步雲端資料庫...</div>

        <div class="tab-system">
            <button class="tab-btn active" onclick="switchMainTab('all')">全體總覽</button>
            <button class="tab-btn" onclick="switchMainTab('personal')">個人紀錄</button>
        </div>

        <div id="pageAll" class="page-content active">
            <div class="table-responsive-wrapper">
                <table class="main-table">
                    <thead>
                        <tr><th style="width:20%">序號</th><th style="width:35%">姓名</th><th style="width:25%">總次數</th><th style="width:20%">操作</th></tr>
                    </thead>
                    <tbody id="allTeacherRows"></tbody>
                </table>
            </div>
        </div>

        <div id="pagePersonal" class="page-content">
            <div class="select-container">
                <label>請選擇人員：</label>
                <select id="teacherSelect" class="select-input" onchange="loadTeacherData()"></select>
            </div>

            <div class="sub-tab-container">
                <button id="subTabStudy" class="sub-tab-btn active" data-type="study" onclick="switchSubTab('study')">📘 研習紀錄</button>
                <button id="subTabExam" class="sub-tab-btn" data-type="exam" onclick="switchSubTab('exam')">📝 命題次數</button>
            </div>

            <div class="mini-summary-row">
                <div class="mini-card">
                    <div id="cardNameLabel" class="label">研習人員</div>
                    <div id="cardTeacherName" class="value">--</div>
                </div>
                <div class="mini-card" id="cardLeftBox">
                    <div id="cardLeftLabel" class="label">去年累計</div>
                    <div id="cardLeftValue" class="value" style="color:#3498db">--</div>
                </div>
                <div class="mini-card" id="cardRightBox">
                    <div id="cardRightLabel" class="label">今年新增</div>
                    <div id="cardRightValue" class="value" style="color:#f39c12">--</div>
                </div>
                <div class="mini-card">
                    <div id="totalLabelText" class="label">總次數</div>
                    <div id="cardTotalValue" class="value" style="color:#f1c40f">--</div>
                </div>
            </div>

            <div id="subContentStudy">
                <div class="section-title">今年研習明細</div>
                <div class="table-responsive-wrapper">
                    <table class="detail-table">
                        <thead>
                            <tr><th>日期</th><th>天數</th><th>時數</th><th>採計</th><th>公文</th><th>結果</th></tr>
                        </thead>
                        <tbody id="studyDetailRows"></tbody>
                    </table>
                </div>
            </div>

            <div id="subContentExam" style="display:none">
                <div class="phase-tab-container">
                    <button class="phase-tab-btn active" onclick="switchPhase(1, '111 ~ 115年')">111 ~ 115年</button>
                    <button class="phase-tab-btn" onclick="switchPhase(2, '116 ~ 120年')">116 ~ 120年</button>
                    <button class="phase-tab-btn" onclick="switchPhase(3, '121 ~ 125年')">121 ~ 125年</button>
                </div>
                
                <div id="matrixTitleText" class="section-title" style="border-left-color: #9b59b6;">111年 ~ 115年 命題次數對照</div>
                <div class="table-responsive-wrapper">
                    <table class="matrix-table">
                        <thead id="matrixHead"></thead>
                        <tbody id="matrixBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let excelRawData = []; 
        let teachersMaster = []; 
        let baseOrder = []; 
        let computedExamMatrix = {};
        let teacherExamScoresCache = {};
        let currentPhase = 1;

        window.addEventListener('DOMContentLoaded', () => {
            fetchExcel();
        });

        function fetchExcel() {
            fetch('114_teacher_record.xlsx')
                .then(res => res.arrayBuffer())
                .then(buffer => {
                    const workbook = XLSX.read(new Uint8Array(buffer), { type: 'array' });
                    
                    excelRawData = XLSX.utils.sheet_to_json(workbook.Sheets["研習紀錄"] || workbook.Sheets[0]);
                    teachersMaster = XLSX.utils.sheet_to_json(workbook.Sheets["教師名稱"] || []);
                    const dutyOrderSheet = XLSX.utils.sheet_to_json(workbook.Sheets["命題排班"] || []);
                    baseOrder = dutyOrderSheet.map(d => d.TeacherName);

                    calculateExamLogic();

                    document.getElementById('syncIndicator').innerText = "成功同步雲端資料庫...";
                    document.getElementById('syncIndicator').className = "sync-status sync-success";
                    
                    initSystem();
                }).catch(err => {
                    document.getElementById('syncIndicator').innerText = "資料庫讀取失敗，請確認檔案。";
                    document.getElementById('syncIndicator').style.background = "#e74c3c";
                });
        }

        function calculateExamLogic() {
            const startYear = 111;
            const endYear = 125;
            computedExamMatrix = {
                1: { years: ["111年", "112年", "113年", "114年", "115年"], rows: [[],[],[],[],[]] },
                2: { years: ["116年", "117年", "118年", "119年", "120年"], rows: [[],[],[],[],[]] },
                3: { years: ["121年", "122年", "123年", "124年", "125年"], rows: [[],[],[],[],[]] }
            };
            
            baseOrder.forEach(name => teacherExamScoresCache[name] = 0);

            for (let y = startYear; y <= endYear; y++) {
                const diff = y - startYear;
                const shift = (diff * 2) % 5;
                let yearOrder = [];
                for (let i = 0; i < 5; i++) {
                    yearOrder.push(baseOrder[(i + shift) % 5]);
                }

                if (shift === 2 || shift === 1) {
                    [yearOrder[2], yearOrder[3]] = [yearOrder[3], yearOrder[2]];
                }

                let phaseId = y <= 115 ? 1 : (y <= 120 ? 2 : 3);
                const colIdx = y - (phaseId === 1 ? 111 : (phaseId === 2 ? 116 : 121));

                for (let r = 0; r < 5; r++) {
                    const score = r < 2 ? 4 : 3;
                    computedExamMatrix[phaseId].rows[r][colIdx] = { name: yearOrder[r], score: score };
                    teacherExamScoresCache[yearOrder[r]] += score;
                }
            }
        }

        function initSystem() {
            const select = document.getElementById('teacherSelect');
            select.innerHTML = "";
            teachersMaster.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t["姓名"];
                opt.text = `職碼 ${t["職碼"]} - ${t["姓名"]}`;
                select.appendChild(opt);
            });
            renderAllOverview();
            loadTeacherData();
        }

        function renderAllOverview() {
            const tbody = document.getElementById('allTeacherRows');
            tbody.innerHTML = "";
            teachersMaster.forEach((t, i) => {
                const name = t["姓名"];
                const baseSum = parseInt(t["歷史截止累計"] || 0);
                const currentSum = excelRawData.filter(d => d["姓名"] === name).reduce((sum, d) => sum + parseInt(d["採計次數"] || 0), 0);
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${i+1}</td><td>${name}</td><td>${baseSum + currentSum}次</td><td><button style="background:#3498db; color:white; border:none; padding:3px 6px; border-radius:4px; cursor:pointer; font-size:14px;" onclick="viewDetail('${name}')">檢視</button></td>`;
                tbody.appendChild(tr);
            });
        }

        function viewDetail(name) {
            document.getElementById('teacherSelect').value = name;
            switchMainTab('personal');
            loadTeacherData();
        }

        function switchMainTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(tab === 'all') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('pageAll').classList.add('active');
                document.getElementById('pagePersonal').classList.remove('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('pagePersonal').classList.add('active');
                document.getElementById('pageAll').classList.remove('active');
            }
        }

        function switchSubTab(type) {
            document.getElementById('subTabStudy').classList.remove('active');
            document.getElementById('subTabExam').classList.remove('active');
            document.getElementById('subContentStudy').style.display = 'none';
            document.getElementById('subContentExam').style.display = 'none';
            
            if(type === 'study') {
                document.getElementById('subTabStudy').classList.add('active');
                document.getElementById('subContentStudy').style.display = 'block';
            } else {
                document.getElementById('subTabExam').classList.add('active');
                document.getElementById('subContentExam').style.display = 'block';
            }
            loadTeacherData();
        }

        function loadTeacherData() {
            const name = document.getElementById('teacherSelect').value;
            if(!name) return;
            document.getElementById('cardTeacherName').innerText = name;
            
            const isStudy = document.getElementById('subTabStudy').classList.contains('active');

            if(isStudy) {
                document.getElementById('cardNameLabel').innerText = "研習人員";
                document.getElementById('cardLeftBox').style.display = "block";
                document.getElementById('cardRightBox').style.display = "block";
                document.getElementById('totalLabelText').innerText = "總次數";
                
                const tInfo = teachersMaster.find(t => t["姓名"] === name);
                const lastYear = tInfo ? parseInt(tInfo["歷史截止累計"] || 0) : 0;
                const records = excelRawData.filter(d => d["姓名"] === name);
                const thisYear = records.reduce((sum, d) => sum + parseInt(d["採計次數"] || 0), 0);

                document.getElementById('cardLeftValue').innerText = lastYear + "次";
                document.getElementById('cardRightValue').innerText = "+" + thisYear + "次";
                document.getElementById('cardTotalValue').innerText = lastYear + thisYear;

                renderStudyTable(records);
            } else {
                document.getElementById('cardNameLabel').innerText = "命題人員";
                document.getElementById('cardLeftBox').style.display = "none";
                document.getElementById('cardRightBox').style.display = "none";
                document.getElementById('totalLabelText').innerText = "111-125年累計";
                document.getElementById('cardTotalValue').innerText = (teacherExamScoresCache[name] || 0) + "次";
                renderMatrix(name);
            }
        }

        function renderStudyTable(records) {
            const tbody = document.getElementById('studyDetailRows');
            tbody.innerHTML = records.length ? "" : '<tr><td colspan="6">今年暫無紀錄</td></tr>';
            records.forEach(r => {
                const docImg = r["研習公文"] ? `<img src="docs/${r["研習公文"]}" class="doc-thumbnail" onclick="window.open(this.src)">` : "---";
                const resImg = r["研習結果"] ? `<img src="docs_result/${r["研習結果"]}" class="doc-thumbnail" onclick="window.open(this.src)">` : "---";
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${r["研習日期"]}</td><td>${r["研習天數"]}</td><td>${r["研習時數"]}</td><td style="color:#2ecc71; font-weight:bold">+${r["採計次數"]}</td><td>${docImg}</td><td>${resImg}</td>`;
                tbody.appendChild(tr);
            });
        }

        function switchPhase(p, text) {
            currentPhase = p;
            const buttons = document.querySelectorAll('.phase-tab-btn');
            buttons.forEach((b, i) => {
                if(i === p-1) b.classList.add('active'); else b.classList.remove('active');
            });
            document.getElementById('matrixTitleText').innerText = `${text} 命題次數對照`;
            renderMatrix(document.getElementById('teacherSelect').value);
        }

        function renderMatrix(selectedName) {
            const head = document.getElementById('matrixHead');
            const body = document.getElementById('matrixBody');
            const data = computedExamMatrix[currentPhase];
            if(!data) return;
            
            // 寬度平分 5 欄 (每欄固定 20%)
            head.innerHTML = "<tr>" + data.years.map(y => `<th style="width:20%">${y}</th>`).join('') + "</tr>";
            
            let html = "";
            data.rows.forEach((row, rIdx) => {
                html += `<tr class="${rIdx < 2 ? 'bg-duty' : ''}">`;
                row.forEach(cell => {
                    const isTarget = cell.name === selectedName;
                    html += `<td><div class="cell-content"><span class="${isTarget ? 'highlight-teacher' : ''}">${cell.name}</span><span class="count-badge">${cell.score}</span></div></td>`;
                });
                html += "</tr>";
            });
            body.innerHTML = html;
        }
    </script>
</body>
</html>
