<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115學年度 - 段考命題輪值</title>
    <style>
        /* 全域基本樣式（深色主題） */
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 上方年度大標題 */
        .header-title {
            background-color: #262626;
            color: #ffffff;
            width: 100%;
            max-width: 900px;
            text-align: center;
            padding: 15px 0;
            font-size: 24px;
            font-weight: bold;
            border-radius: 6px;
            margin-bottom: 15px;
            border: 1px solid #333333;
        }

        /* 同步雲端資料狀態列 */
        .status-bar {
            background-color: #1a1a1a;
            color: #888888;
            width: 100%;
            max-width: 900px;
            text-align: center;
            padding: 10px 0;
            font-size: 14px;
            border-radius: 6px;
            margin-bottom: 30px;
            border: 1px solid #262626;
        }
        .status-success {
            color: #2ed573;
            font-weight: bold;
        }

        /* 三個階段的大容器 */
        .stage-container {
            width: 100%;
            max-width: 900px;
            margin-bottom: 35px;
        }

        /* 階段標題（如：第一階段：111年 ~ 115年） */
        .stage-title {
            font-size: 18px;
            font-weight: bold;
            border-left: 4px solid #a29bfe;
            padding-left: 10px;
            margin-bottom: 15px;
            color: #e0e0e0;
        }

        /* 輪值表格的 Flex 網格布局 */
        .duty-grid {
            display: flex;
            gap: 12px;
            width: 100%;
            overflow-x: auto;
        }

        /* 每一個年份的獨立直欄卡片 */
        .year-card {
            flex: 1;
            min-width: 150px;
            background-color: #141414;
            border: 1px solid #2d2d2d;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 年份卡片頂部（例如：115 年） */
        .year-card-header {
            background-color: #1f1f1f;
            text-align: center;
            padding: 10px 0;
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            border-bottom: 1px solid #2d2d2d;
        }

        /* 年份卡片內部的老師垂直清單容器 */
        .teachers-list {
            display: flex;
            flex-direction: column;
            padding: 4px;
            background-color: #111111;
        }

        /* 每位老師的橫條項目 */
        .teacher-item {
            display: flex;
            justify-content: space-between; /* 名字靠左，數字靠右 */
            align-items: center;
            padding: 8px 12px;
            font-size: 15px;
            border-bottom: 1px solid #1c1c1c;
            transition: background-color 0.2s;
        }
        .teacher-item:last-child {
            border-bottom: none;
        }

        /* 負責該年段考命題的老師（4次）樣式 */
        .duty-active {
            color: #ffffff;
            font-weight: bold;
            background-color: rgba(255, 255, 255, 0.03);
        }
        /* 數字 4 的顏色（亮橘色，更醒目） */
        .duty-active .count-num {
            color: #ff9f43;
            font-weight: 900;
        }

        /* 未負責該年段考命題的老師（3次）樣式 */
        .duty-normal {
            color: #888888; /* 顏色略暗，做出明顯對比層次 */
        }
        /* 數字 3 的顏色（低調灰） */
        .duty-normal .count-num {
            color: #555555;
        }

        /* 等寬字型讓次數右側完美對齊 */
        .count-num {
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            margin-left: 8px;
        }
    </style>
</head>
<body>

    <div class="header-title">115學年度</div>

    <div class="status-bar" id="statusBar">正在同步雲端資料庫...</div>

    <div class="stage-container">
        <div class="stage-title">第一階段：111年 ~ 115年 命題輪值 (每年2位負責)</div>
        <div class="duty-grid" id="stage1Grid"></div>
    </div>

    <div class="stage-container">
        <div class="stage-title">第二階段：116年 ~ 120年 命題輪值 (每年2位負責)</div>
        <div class="duty-grid" id="stage2Grid"></div>
    </div>

    <div class="stage-container">
        <div class="stage-title">第三階段：121年 ~ 125年 命題輪值 (每年2位負責)</div>
        <div class="duty-grid" id="stage3Grid"></div>
    </div>

    <script>
        // 1. 定義全體 5 位老師的固定名單（維持排序）
        const allTeachers = ["盧○", "李○", "蘭○", "曹○", "張○"];

        // 2. 定義 111 年至 125 年，每年原本負責段考命題的 2 位老師（負責人會拿 4 次）
        const yearlyDutySetup = {
            // 第一階段
            111: ["盧○", "李○"],
            112: ["蘭○", "曹○"],
            113: ["張○", "盧○"],
            114: ["李○", "蘭○"],
            115: ["曹○", "張○"],
            // 第二階段
            116: ["盧○", "李○"],
            117: ["蘭○", "曹○"],
            118: ["張○", "盧○"],
            119: ["李○", "蘭○"],
            120: ["曹○", "張○"],
            // 第三階段
            121: ["盧○", "李○"],
            122: ["蘭○", "曹○"],
            123: ["張○", "盧○"],
            124: ["李○", "蘭○"],
            125: ["曹○", "張○"]
        };

        /**
         * 動態動態建構單一年份卡片的 HTML
         * @param {number} year 年份
         */
        function generateYearCardHtml(year) {
            // 撈出該年原本負責的 2 位老師
            const activeDuty = yearlyDutySetup[year] || [];

            // 建立 5 位老師的最終排列清單（為了讓今年負責的 2 位排在最上面）
            const finalDisplayList = [];
            
            // 先放負責的老師（4次）
            activeDuty.forEach(name => {
                if(allTeachers.includes(name)) {
                    finalDisplayList.push({ name: name, count: 4, isActive: true });
                }
            });

            // 再放其餘沒有輪到的老師（3次）
            allTeachers.forEach(name => {
                if (!activeDuty.includes(name)) {
                    finalDisplayList.push({ name: name, count: 3, isActive: false });
                }
            });

            // 開始組合該年份格子的 HTML 結構
            let html = `
                <div class="year-card">
                    <div class="year-card-header">${year} 年</div>
                    <div class="teachers-list">
            `;

            // 走訪 5 位老師，生成垂直清單
            finalDisplayList.forEach(item => {
                const itemClass = item.isActive ? 'duty-active' : 'duty-normal';
                html += `
                    <div class="teacher-item ${itemClass}">
                        <span class="teacher-name">${item.name}</span>
                        <span class="count-num">${item.count}</span>
                    </div>
                `;
            });

            html += `
                    </div>
                </div>
            `;
            return html;
        }

        /**
         * 執行渲染全網頁表格
         */
        function renderAllGrids() {
            let stage1Html = "";
            let stage2Html = "";
            let stage3Html = "";

            // 跑迴圈生成各階段的年份卡片
            for (let y = 111; y <= 125; y++) {
                const cardHtml = generateYearCardHtml(y);
                if (y <= 115) {
                    stage1Html += cardHtml;
                } else if (y <= 120) {
                    stage2Html += cardHtml;
                } else {
                    stage3Html += cardHtml;
                }
            }

            // 將生成的卡片塞入對應的網頁區塊
            document.getElementById("stage1Grid").innerHTML = stage1Html;
            document.getElementById("stage2Grid").innerHTML = stage2Html;
            document.getElementById("stage3Grid").innerHTML = stage3Html;

            // 模擬載入完成後，將動畫文字轉為「成功同步雲端資料...」
            setTimeout(() => {
                const statusBar = document.getElementById("statusBar");
                statusBar.innerHTML = '<span class="status-success">成功同步雲端資料...</span>';
            }, 800); // 0.8秒後顯示綠色成功標籤
        }

        // 網頁載入完成後立即執行
        window.onload = renderAllGrids;
    </script>
</body>
</html>
