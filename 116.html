<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115學年度</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            /* === 星空深灰專業配色 === */
            --primary-bg: #121212;      
            --card-bg: #1e1e1e;         
            --header-bg: #2d2d2d;       
            --table-header-bg: #333333; 
            
            --text-main: #e0e0e0;       
            --text-muted: #a0a0a0;      
            --text-on-primary: #ffffff; 
            
            --accent-blue: #3498db;     
            --accent-gold: #f39c12;     
            --success-green: #2ecc71;   
            --danger-red: #e74c3c;      
            
            /* === 優雅淡紫色系 === */
            --accent-purple: #9b59b6;   
            --accent-purple-hover: rgba(155, 89, 182, 0.2);
            
            --border-color: #383838;    
            --overlay-bg: rgba(0, 0, 0, 0.95); 
        }

        /* 基礎全域大字體設定 */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang TC", "Microsoft JhengHei", sans-serif; 
            font-size: 22px; 
            -webkit-font-smoothing: antialiased; 
        }
        body { background-color: var(--primary-bg); color: var(--text-main); line-height: 1.4; padding: 10px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* 標題區 */
        header { text-align: center; margin-bottom: 10px; background: var(--header-bg); padding: 10px 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid var(--border-color); }
        header h1 { color: var(--text-on-primary); font-size: 28px; font-weight: bold; }
        
        /* 雲端連線狀態 */
        .status-zone {
            background: rgba(52, 152, 219, 0.05); 
            border: 1px dashed rgba(52, 152, 219, 0.3);
            padding: 8px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .status-badge { display: inline-block; padding: 3px 12px; background: #444; color: var(--text-main); border-radius: 20px; font-size: 18px; font-weight: bold; }
        .status-badge.loaded { background: var(--success-green); color: white; }
        .status-badge.error { background: var(--danger-red); color: white; }

        /* 內容呈現區 */
        .main-content { display: none; margin-top: 5px; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 10px; }
        
        /* 主功能頁籤 */
        .tab-btn { flex: 1; text-align: center; padding: 10px 15px; background: #333; border: none; border-radius: 6px; cursor: pointer; font-size: 22px; font-weight: bold; color: var(--text-main); }
        .tab-btn.active { background: var(--accent-blue); color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }

        /* 個人紀錄下拉選單 */
        .personal-select-wrapper { margin-bottom: 12px; display: flex; flex-direction: column; gap: 6px; }
        .personal-select-wrapper label { font-size: 22px; font-weight: bold; color: var(--text-main); }
        select { width: 100%; padding: 8px 16px; font-size: 22px; font-weight: bold; border-radius: 6px; border: 2px solid var(--accent-blue); outline: none; background: var(--card-bg); color: var(--text-main); cursor: pointer; }

        /* 子功能頁籤按鈕群組 */
        .sub-tabs-container { display: flex; gap: 12px; margin-bottom: 15px; }
        .sub-tab-btn { padding: 8px 20px; background: #2b2b2b; border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; font-size: 20px; font-weight: bold; color: var(--text-muted); transition: all 0.25s dashed; display: flex; align-items: center; gap: 6px; }
        
        /* 📘 研習紀錄按鈕樣式 */
        .sub-tab-btn.theme-seminar { border-color: rgba(52, 152, 219, 0.4); }
        .sub-tab-btn.theme-seminar:hover { background: rgba(52, 152, 219, 0.15); color: #fff; }
        .sub-tab-btn.active.theme-seminar { background: var(--accent-blue); color: white; border-color: var(--accent-blue); box-shadow: 0 2px 8px rgba(52, 152, 219, 0.4); }
        
        /* 📝 段考命題按鈕樣式：淡紫色 */
        .sub-tab-btn.theme-exam { border-color: rgba(155, 89, 182, 0.4); color: #d2b4de; }
        .sub-tab-btn.theme-exam:hover { background: var(--accent-purple-hover); color: #fff; }
        .sub-tab-btn.active.theme-exam { background: var(--accent-purple); color: white; border-color: var(--accent-purple); box-shadow: 0 2px 8px rgba(155, 89, 182, 0.5); }

        /* 命題輪值專用：階段切換鈕樣式 */
        .phase-tabs-container { display: flex; gap: 8px; margin: 12px 0; background: rgba(255,255,255,0.03); padding: 6px; border-radius: 8px; border: 1px solid var(--border-color); }
        .phase-tab-btn { flex: 1; padding: 8px 10px; background: transparent; border: none; border-radius: 6px; color: var(--text-muted); font-size: 20px; font-weight: bold; cursor: pointer; transition: all 0.2s ease; text-align: center; }
        .phase-tab-btn:hover { background: rgba(155, 89, 182, 0.1); color: #fff; }
        .phase-tab-btn.active { background: var(--accent-purple); color: #fff; box-shadow: 0 2px 6px rgba(155, 89, 182, 0.4); }

        /* 檢視區塊卡片 */
        .view-section { background: var(--card-bg); padding: 12px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid var(--border-color); display: none; }
        .view-section.active { display: block; }
        .view-section h3 { font-size: 24px; color: var(--text-main); margin-bottom: 8px; border-bottom: 2px solid var(--border-color); padding-bottom: 4px; font-weight: bold; }

        /* 個人摘要統計大字卡 */
        .summary-box { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 15px; }
        .summary-card { background: rgba(255,255,255,0.02); padding: 8px; border-radius: 6px; text-align: center; border: 1px solid var(--border-color); }
        .summary-card h4 { font-size: 16px; color: var(--text-muted); margin-bottom: 2px; font-weight: bold; }
        .summary-card p { font-size: 20px; font-weight: bold; color: var(--text-on-primary); }
        .summary-card .blue-highlight { color: var(--accent-blue); }
        .summary-card .purple-highlight { color: #c39bd3; font-size: 30px; } 
        
        .summary-box-card { background: rgba(255,255,255,0.02); padding: 8px; border-radius: 6px; text-align: center; border: 1px solid var(--border-color); }
        .summary-box-card h4 { font-size: 16px; color: var(--text-muted); margin-bottom: 2px; font-weight: bold; }
        .summary-box-card p { font-size: 22px; font-weight: bold; color: var(--accent-gold); }
        
        /* 側邊裝飾條標題 */
        .history-title { margin: 18px 0 8px 0; font-size: 24px; font-weight: bold; color: var(--text-on-primary); border-left: 5px solid var(--accent-blue); padding-left: 10px; line-height: 1.3; }
        
        /* 表格響應式包覆層 */
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 20px; border-radius: 6px; border: 1px solid var(--border-color); }

        /* 輪值表專用表格樣式 */
        .rotation-table { width: 100%; border-collapse: collapse; text-align: center; background: rgba(255,255,255,0.01); }
        .rotation-table th, .rotation-table td { padding: 12px 10px; border: 1px solid var(--border-color); font-size: 22px; text-align: center; vertical-align: middle; white-space: nowrap; }
        .rotation-table th { background-color: var(--table-header-bg); color: var(--text-main); font-weight: bold; }
        .rotation-table td { color: var(--text-main); height: 55px; }
        
        /* 當前選擇教師且是115年出題時的高亮樣式（優雅淡紫） */
        .highlight-current-teacher { background-color: rgba(155, 89, 182, 0.4) !important; color: #ffffff !important; font-weight: bold; border: 2px solid var(--accent-purple) !important; }
        /* 一般被選中教師在其他年份的高亮 */
        .highlight-other-year { background-color: rgba(255, 255, 255, 0.12); color: var(--accent-gold); font-weight: bold; }
        /* 115本學年度欄位醒目外框 */
        .col-115 { border-left: 2px solid var(--accent-blue) !important; border-right: 2px solid var(--accent-blue) !important; }
        .th-115 { background-color: #2c3e50 !important; color: #5dade2 !important; border-left: 2px solid var(--accent-blue) !important; border-right: 2px solid var(--accent-blue) !important; }

        .btn-view { padding: 5px 14px; background-color: var(--accent-blue); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 20px; }
        
        /* === 🎯 列表小圓形圖示（Icon）設定 === */
        .doc-thumbnail { 
            display: inline-block; 
            height: 45px; 
            width: 45px;           /* 固定寬度，與高度一致 */
            border-radius: 50%;    /* 裁剪為正圓形 */
            object-fit: cover;     /* 關鍵：縮圖置中填滿，不壓縮變形 */
            cursor: pointer; 
            transition: transform 0.2s; 
            border: 1px solid var(--border-color); 
            vertical-align: middle; 
        }
        .doc-thumbnail:hover { transform: scale(1.1); }
        
        /* === 🎯 點擊放大後的滿版圖片遮罩層設定 === */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--overlay-bg); z-index: 9999; justify-content: center; align-items: center; }
        .overlay.active { display: flex; }
        
        /* 放大圖：維持原圖形狀，不套用圓形裁切 */
        .full-doc-image { 
            max-width: 95%; 
            max-height: 85%; 
            border-radius: 6px;    /* 微圓角（非圓形），保持原圖長寬 */
            border: 2px solid #fff; 
            object-fit: contain;   /* 完整呈現全圖比例，不留白不裁切 */
        }
        .overlay-close-btn { position: absolute; top: 20px; right: 25px; color: #fff; font-size: 45px; font-weight: bold; cursor: pointer; }

        @media (max-width: 768px) {
            body { padding: 6px; }
            * { font-size: 16px; }
            .rotation-table th, .rotation-table td { font-size: 16px; padding: 8px 4px; height: 45px; }
            .tab-btn { font-size: 20px; padding: 8px 6px; }
            .sub-tab-btn { font-size: 16px; padding: 6px 12px; }
            .phase-tab-btn { font-size: 15px; padding: 6px 4px; }
            select { font-size: 16px; padding: 6px 10px; }
            .summary-card p { font-size: 20px !important; }
            .summary-box-card p { font-size: 22px !important; }
            .history-title { font-size: 18px; }
        }

        @media (min-width: 769px) {
            .personal-select-wrapper { flex-direction: row; align-items: center; }
            .personal-select-wrapper label { white-space: nowrap; }
            .summary-box { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>115學年度</h1>
    </header>

    <div class="status-zone">
        <span id="file-status" class="status-badge">正在同步雲端資料庫...</span>
    </div>

    <div class="main-content" id="main-content">
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchView('overview')">全體總覽</button>
            <button class="tab-btn" onclick="switchView('personal')">個人紀錄</button>
        </div>

        <div id="overview-view" class="view-section active">
            <h3>全體人員摘要</h3>
            <div class="table-responsive">
                <table class="rotation-table">
                    <thead>
                        <tr>
                            <th>序號</th>
                            <th>姓名</th>
                            <th>研習總次數</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="overview-tbody"></tbody>
                </table>
            </div>
        </div>

        <div id="personal-view" class="view-section">
            <div class="personal-select-wrapper">
                <label for="teacher-select">請選擇人員：</label>
                <select id="teacher-select" onchange="changedTeacher(this.value)"></select>
            </div>
            
            <div class="sub-tabs-container">
                <button id="sub-tab-seminar" class="sub-tab-btn active theme-seminar" onclick="switchSubTab('seminar')">📘 研習紀錄</button>
                <button id="sub-tab-exam" class="sub-tab-btn theme-exam" onclick="switchSubTab('exam')">📝 命題次數(4)</button>
            </div>

            <div id="dynamic-personal-zone"></div>
        </div>
    </div>
</div>

<div id="doc-overlay" class="overlay" onclick="closeDoc()">
    <span class="overlay-close-btn">&times;</span>
    <img src="" alt="圖片放大圖" id="full-doc-image" class="full-doc-image">
</div>

<script>
    let systemData = []; 
    let currentSubTab = 'seminar'; 
    let currentExamPhase = 1; 
    const excelFileName = '114_teacher_record.xlsx';

    const yearPairs = {
        0: ["盧◯", "李◯"], 
        1: ["藺◯", "曹◯"], 
        2: ["張◯", "盧◯"], 
        3: ["李◯", "藺◯"], 
        4: ["曹◯", "張◯"]  
    };
    
    function getExamTeachersByYear(year) {
        const cycleIndex = (year - 111) % 5;
        return yearPairs[cycleIndex] || [];
    }

    let globalExamSchedule = {};
    for (let y = 111; y <= 125; y++) {
        globalExamSchedule[y] = getExamTeachersByYear(y);
    }

    window.addEventListener('DOMContentLoaded', () => {
        fetch(excelFileName)
            .then(response => {
                if (!response.ok) throw new Error('找不到 Excel 檔案。');
                return response.arrayBuffer();
            })
            .then(buffer => {
                const data = new Uint8Array(buffer);
                const workbook = XLSX.read(data, { type: 'array' });
                
                const sheetTeachers = XLSX.utils.sheet_to_json(workbook.Sheets["教師名稱"] || workbook.Sheets[0]);
                const sheetRecords = XLSX.utils.sheet_to_json(workbook.Sheets["研習紀錄"] || []);
                
                mergeDatabase(sheetTeachers, sheetRecords);

                document.getElementById('file-status').textContent = `成功同步雲端資料...`;
                document.getElementById('file-status').className = "status-badge loaded";
                document.getElementById('main-content').style.display = "block";

                refreshUI();
            })
            .catch(error => {
                console.error(error);
                document.getElementById('file-status').textContent = `連線失敗`;
                document.getElementById('file-status').className = "status-badge error";
            });
    });

    function mergeDatabase(teachers, records) {
        systemData = teachers.map(t => {
            const id = String(t["職碼"] || "").trim();
            const name = String(t["姓名"] || "").trim();
            
            const seminarPrev = parseInt(t["歷史截止累計"]) || 0;
            const matchedRecords = records.filter(r => String(r["姓名"] || "").trim() === name).map(r => ({
                date: String(r["研習日期"] || "").trim(),
                item: String(r["研習天數"] || r["研習天數項目"] || "").trim(),
                hours: String(r["研習時數"] || "").trim(),
                count: parseInt(r["採計次數"]) || 0,
                document: String(r["研習公文"] || "").trim(),
                resultDoc: String(r["研習結果"] || "").trim() 
            )).filter(r => r.date !== "");

            let examNew = 0;      
            let examHistory = 0;  
            
            for(let y=111; y<=125; y++) {
                const isAssigned = globalExamSchedule[y].some(tName => name.includes(tName.replace("◯","")) || tName.includes(name.replace("◯","")));
                if(isAssigned) {
                    if(y === 115) {
                        examNew = 4;
                    } else {
                        examHistory += 4;
                    }
                }
            }

            return { id, name, seminarPrev, records: matchedRecords, examNew, examHistory };
        }).filter(t => t.id !== "");
    }

    function refreshUI() {
        renderOverviewTable();
        populateTeacherSelect();
        const select = document.getElementById('teacher-select');
        if (select.options.length > 0) renderPersonalZone(select.value);
    }

    function switchView(viewType) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
        if(viewType === 'overview') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('overview-view').classList.add('active');
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('personal-view').classList.add('active');
        }
    }

    function switchSubTab(type) {
        currentSubTab = type;
        document.querySelectorAll('.sub-tab-btn').forEach(btn => btn.classList.remove('active'));
        if(type === 'seminar') {
            document.getElementById('sub-tab-seminar').classList.add('active');
        } else {
            document.getElementById('sub-tab-exam').classList.add('active');
        }
        renderPersonalZone(document.getElementById('teacher-select').value);
    }

    function switchPhase(phaseNum) {
        currentExamPhase = phaseNum;
        renderPersonalZone(document.getElementById('teacher-select').value);
    }

    function populateTeacherSelect() {
        const select = document.getElementById('teacher-select');
        select.innerHTML = '';
        systemData.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t.id;
            opt.textContent = `職碼 ${t.id} - ${t.name}`;
            select.appendChild(opt);
        });
    }

    function changedTeacher(id) {
        renderPersonalZone(id);
    }

    function viewTeacherDetail(id) {
        document.getElementById('teacher-select').value = id;
        renderPersonalZone(id);
        switchView('personal');
    }

    function renderOverviewTable() {
        const tbody = document.getElementById('overview-tbody');
        tbody.innerHTML = '';
        systemData.forEach(t => {
            const semNew = t.records.reduce((sum, r) => sum + r.count, 0);
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${t.id}</strong></td>
                <td><strong>${t.name}</strong></td>
                <td><span class="final-count">${t.seminarPrev + semNew} 次</span></td>
                <td><button class="btn-view" onclick="viewTeacherDetail('${t.id}')">檢視</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function generate5YearTableHtml(startYear, endYear, currentTeacherName) {
        let thHtml = '<tr>';
        for (let y = startYear; y <= endYear; y++) {
            const class115 = (y === 115) ? 'class="th-115"' : '';
            thHtml += `<th ${class115}>${y} 年</th>`;
        }
        thHtml += '</tr>';

        let rowsHtml = '';
        for (let rowIdx = 0; rowIdx < 2; rowIdx++) {
            rowsHtml += '<tr>';
            for (let y = startYear; y <= endYear; y++) {
                const teachers = globalExamSchedule[y];
                const teacherName = teachers[rowIdx] || "";
                
                const isCurrent = currentTeacherName.includes(teacherName.replace("◯","")) || teacherName.includes(currentTeacherName.replace("◯",""));
                
                let cellClass = '';
                if (isCurrent && teacherName !== "") {
                    cellClass = (y === 115) ? 'class="highlight-current-teacher col-115"' : 'class="highlight-other-year"';
                } else if (y === 115) {
                    cellClass = 'class="col-115"';
                }

                rowsHtml += `<td ${cellClass}>${teacherName}</td>`;
            }
            rowsHtml += '</tr>';
        }

        return `
            <div class="table-responsive">
                <table class="rotation-table">
                    <thead>${thHtml}</thead>
                    <tbody>${rowsHtml}</tbody>
                </table>
            </div>
        `;
    }

    function renderPersonalZone(id) {
        const t = systemData.find(teacher => teacher.id === id);
        const targetDiv = document.getElementById('dynamic-personal-zone');
        if (!t) { targetDiv.innerHTML = ''; return; }

        if (currentSubTab === 'seminar') {
            const newCount = t.records.reduce((sum, r) => sum + r.count, 0);
            const totalCount = t.seminarPrev + newCount;

            let rows = '';
            if (t.records.length === 0) {
                rows = `<tr><td colspan="6" class="no-data">目前無研習明細紀錄</td></tr>`;
            } else {
                t.records.forEach(r => {
                    const docImg = r.document ? `<img src="docs/${r.document}" class="doc-thumbnail" onclick="openDoc('docs', '${r.document}')">` : '---';
                    const resImg = r.resultDoc ? `<img src="docs_result/${r.resultDoc}" class="doc-thumbnail" onclick="openDoc('docs_result', '${r.resultDoc}')">` : '---';
                    rows += `
                        <tr>
                            <td><strong>${r.date}</strong></td>
                            <td>${r.item}</td>
                            <td>${r.hours}</td>
                            <td><strong>+${r.count} 次</strong></td>
                            <td>${docImg}</td>
                            <td>${resImg}</td>
                        </tr>
                    `;
                });
            }

            targetDiv.innerHTML = `
                <div class="summary-box">
                    <div class="summary-card"><h4>研習人員</h4><p>${t.name}</p></div>
                    <div class="summary-card"><h4>去年累計</h4><p>${t.seminarPrev}次</p></div>
                    <div class="summary-card"><h4>今年新增</h4><p class="blue-highlight">+${newCount}次</p></div>
                    <div class="summary-box-card"><h4>總次數</h4><p>${totalCount}</p></div>
                </div>
                <div class="history-title">今年研習明細</div>
                <div class="table-responsive">
                    <table class="rotation-table">
                        <thead>
                            <tr>
                                <th>研習<BR>日期</th>
                                <th>研習<BR>天數</th>
                                <th>研習<BR>時數</th>
                                <th>採計<BR>次數</th>
                                <th style="color: var(--danger-red);">研習<BR>公文</th>
                                <th style="color: var(--success-green);">研習<BR>結果</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;
        } else {
            const activeP1 = currentExamPhase === 1 ? 'active' : '';
            const activeP2 = currentExamPhase === 2 ? 'active' : '';
            const activeP3 = currentExamPhase === 3 ? 'active' : '';

            let targetTableHtml = '';
            let titleText = '';

            if (currentExamPhase === 1) {
                titleText = "111～115年_命題4次";
                targetTableHtml = generate5YearTableHtml(111, 115, t.name);
            } else if (currentExamPhase === 2) {
                titleText = "116～120年_命題4次";
                targetTableHtml = generate5YearTableHtml(116, 120, t.name);
            } else {
                titleText = "121～125年_命題4次";
                targetTableHtml = generate5YearTableHtml(121, 125, t.name);
            }

            targetDiv.innerHTML = `
                <div class="phase-tabs-container">
                    <button class="phase-tab-btn ${activeP1}" onclick="switchPhase(1)">111 ~ 115年</button>
                    <button class="phase-tab-btn ${activeP2}" onclick="switchPhase(2)">116 ~ 120年</button>
                    <button class="phase-tab-btn ${activeP3}" onclick="switchPhase(3)">121 ~ 125年</button>
                </div>

                <div class="history-title" style="border-left-color: var(--accent-purple); margin-top: 10px;">${titleText}</div>
                ${targetTableHtml}
            `;
        }
    }

    function openDoc(folder, file) {
        document.getElementById('full-doc-image').src = `${folder}/${file}`;
        document.getElementById('doc-overlay').classList.add('active');
    }

    function closeDoc() {
        document.getElementById('doc-overlay').classList.remove('active');
    }
</script>
</body>
</html>
