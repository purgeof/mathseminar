<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115學年度 研習紀錄查詢系統</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --table-bg: #252525;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --primary-blue: #2196f3;
            --success-green: #4caf50;
            --accent-orange: #ff9800;
            --border-color: #333333;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        /* 標頭風格 */
        .header-title {
            background-color: var(--card-bg);
            text-align: center;
            padding: 15px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .status-bar {
            background-color: var(--card-bg);
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 6px;
        }

        .status-badge {
            background-color: rgba(76, 175, 80, 0.2);
            color: #81c784;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            display: inline-block;
        }

        /* 篩選區域 */
        .filter-section {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .selector-group {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        label {
            font-size: 18px;
            font-weight: bold;
        }

        select {
            background-color: #151515;
            color: var(--text-color);
            border: 1px solid var(--primary-blue);
            padding: 8px 15px;
            font-size: 16px;
            border-radius: 4px;
            width: 250px;
            outline: none;
        }

        /* 統計卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background-color: #1a1a1a;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            text-align: center;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: bold;
        }

        .stat-value.add { color: var(--primary-blue); }
        .stat-value.total { color: var(--accent-orange); }

        /* 明細表格 */
        .detail-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary-blue);
            padding-left: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--table-bg);
            border-radius: 6px;
            overflow: hidden;
        }

        th, td {
            padding: 12px 15px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #2d2d2d;
            color: var(--text-muted);
            font-weight: normal;
        }

        .txt-bold { font-weight: bold; }
        .txt-add { color: var(--success-green); font-weight: bold; }
        
        th.col-doc { color: #ff7043; }
        th.col-result { color: #66bb6a; }

        /* 圖片預覽樣式 */
        .img-preview {
            max-width: 80px;
            max-height: 50px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid #444;
            background-color: #111;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .img-preview:hover {
            transform: scale(1.1);
        }

        .no-data {
            color: var(--text-muted);
            font-style: italic;
        }

        /* 讀取中遮罩 */
        #loading {
            color: var(--accent-orange);
            font-size: 18px;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-title">115學年度</div>
        <div class="status-bar">
            <span class="status-badge">成功同步雲端資料...</span>
        </div>

        <div class="filter-section">
            <div class="selector-group">
                <label for="teacherSelect">請選擇人員：</label>
                <select id="teacherSelect">
                    <option value="">載入中...</option>
                </select>
            </div>
        </div>

        <div id="loading">正在下載並解析 Excel 資料，請稍候...</div>

        <div id="mainContent" style="display: none;">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">研習人員</div>
                    <div class="stat-value" id="statName">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">去年累計</div>
                    <div class="stat-value" id="statLastYear">0 次</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">今年新增</div>
                    <div class="stat-value add" id="statThisYear">+0 次</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">總次數</div>
                    <div class="stat-value total" id="statTotal">0</div>
                </div>
            </div>

            <div class="detail-title">今年研習明細</div>
            <table>
                <thead>
                    <tr>
                        <th>研習日期</th>
                        <th>研習天數</th>
                        <th>研習時數</th>
                        <th>採計次數</th>
                        <th class="col-doc">研習公文</th>
                        <th class="col-result">研習結果</th>
                    </tr>
                </thead>
                <tbody id="detailTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // 全局變數儲存解析後的資料
        let excelData = [];
        let teacherList = [];

        // 頁面載入後自動執行 Fetch Excel
        window.addEventListener('DOMContentLoaded', () => {
            fetchExcelData();
        });

        // 讀取同目錄下的 Excel 檔案
        function fetchExcelData() {
            const excelUrl = '114_teacher_record.xlsx'; // 相對路徑

            fetch(excelUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('無法讀取 Excel 檔案，請確認檔案是否存在於儲存庫根目錄。');
                    }
                    return response.arrayBuffer();
                })
                .then(buffer => {
                    const data = new Uint8Array(buffer);
                    const workbook = XLSX.read(data, { type: 'array' });
                    
                    // 預設讀取第一個工作表 (研習紀錄)
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    
                    // 將工作表轉換為 JSON 物件陣列
                    excelData = XLSX.utils.sheet_to_json(worksheet);
                    
                    // 建立選單人員清單
                    initTeacherSelector();
                })
                .catch(error => {
                    document.getElementById('loading').innerText = '錯誤: ' + error.message;
                    console.error(error);
                });
        }

        // 初始化人員下拉選單
        function initTeacherSelector() {
            const selectEl = document.getElementById('teacherSelect');
            selectEl.innerHTML = ''; // 清空載入中提示

            // 從 Excel 資料的「姓名」欄位萃取不重複名單
            // 假設職碼格式固定，這裡簡單產出不重複姓名
            const uniqueNames = [...new Set(excelData.map(item => item['姓名']))].filter(Boolean);

            if(uniqueNames.length === 0) {
                selectEl.innerHTML = '<option value="">未找到人員資料</option>';
                return;
            }

            // 產出 Option，這裡模擬職碼對應（亦可直接從您的「教師名稱」工作表讀取職碼）
            uniqueNames.forEach((name, index) => {
                const option = document.createElement('option');
                option.value = name;
                option.text = `職碼 ${index + 1} - ${name}`;
                selectEl.appendChild(option);
            });

            // 隱藏 Loading，顯示主區塊
            document.getElementById('loading').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';

            // 監聽選單切換事件
            selectEl.addEventListener('change', (e) => {
                renderTeacherRecord(e.target.value);
            });

            // 預設選取第一個人員進行渲染
            renderTeacherRecord(uniqueNames[0]);
        }

        // 渲染指定教師的統計數據與明細表格
        function renderTeacherRecord(teacherName) {
            if (!teacherName) return;

            // 篩選出該教師的所有研習明細
            const records = excelData.filter(item => item['姓名'] === teacherName);

            // 1. 計算與填入統計卡片資料
            // 讀取該教師第一筆紀錄中的歷史截止累計作為基準
            const baseCount = records.length > 0 ? parseInt(records[0]['歷史截止累計'] || 0) : 0;
            
            // 計算今年新增的總採計次數
            let thisYearNewAdded = 0;
            records.forEach(item => {
                thisYearNewAdded += parseInt(item['採計次數'] || 0);
            });

            document.getElementById('statName').innerText = teacherName;
            document.getElementById('statLastYear').innerText = `${baseCount} 次`;
            document.getElementById('statThisYear').innerText = `+${thisYearNewAdded} 次`;
            document.getElementById('statTotal').innerText = baseCount + thisYearNewAdded;

            // 2. 渲染明細表格
            const tbody = document.getElementById('detailTableBody');
            tbody.innerHTML = ''; // 清空舊資料

            if (records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="no-data">今年無研習紀錄</td></tr>';
                return;
            }

            records.forEach(item => {
                const tr = document.createElement('tr');

                // 研習日期格式化 (若為 Excel 序列值需注意，此處假設為字串如 114/08/18)
                const dateVal = item['研習日期'] || '--';
                const dayVal = item['研習天數'] || '--';
                const hourVal = item['研習時數'] || '--';
                const countVal = item['採計次數'] ? `+${item['採計次數']} 次` : '--';

                // --- 關鍵核心：處理研習公文相對路徑 (docs/) ---
                let docTdHtml = '<td class="no-data">---</td>';
                if (item['研習公文'] && item['研習公文'].toString().trim() !== '---') {
                    const docFileName = item['研習公文'].toString().trim();
                    // 自動拼接資料夾路徑前綴 docs/
                    docTdHtml = `<td><img src="docs/${docFileName}" class="img-preview" alt="公文" onclick="window.open(this.src)"></td>`;
                }

                // --- 關鍵核心：處理研習結果相對路徑 (docs_result/) ---
                let resultTdHtml = '<td class="no-data">---</td>';
                if (item['研習結果'] && item['研習結果'].toString().trim() !== '---') {
                    const resultFileName = item['研習結果'].toString().trim();
                    // 自動拼接資料夾路徑前綴 docs_result/
                    resultTdHtml = `<td><img src="docs_result/${resultFileName}" class="img-preview" alt="結果" onclick="window.open(this.src)"></td>`;
                }

                // 組裝完整 Row 內容
                tr.innerHTML = `
                    <td class="txt-bold">${dateVal}</td>
                    <td>${dayVal}</td>
                    <td>${hourVal}</td>
                    <td class="txt-add">${countVal}</td>
                    ${docTdHtml}
                    ${resultTdHtml}
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
