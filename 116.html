<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>114學年度--研習次數記錄</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-bg: #121212;      
            --card-bg: #1e1e1e;         
            --header-bg: #2d2d2d;       
            --table-header-bg: #333333; 
            --text-main: #e0e0e0;       
            --text-muted: #a0a0a0;      
            --text-on-primary: #ffffff; 
            --accent-blue: #3498db;     
            --accent-gold: #f39c12;     
            --success-green: #2ecc71;   
            --danger-red: #e74c3c;      
            --border-color: #383838;    
            --overlay-bg: rgba(0, 0, 0, 0.95); 
        }

        /* 全域大字體與截圖極簡風格 */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang TC", "Microsoft JhengHei", sans-serif; 
            font-size: 22px; 
            -webkit-font-smoothing: antialiased; 
        }
        body { background-color: var(--primary-bg); color: var(--text-main); line-height: 1.4; padding: 10px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* 標題區 */
        header { text-align: center; margin-bottom: 10px; background: var(--header-bg); padding: 12px 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid var(--border-color); }
        header h1 { color: var(--text-on-primary); font-size: 28px; font-weight: bold; }
        
        /* 連線狀態提示區 */
        .status-zone { background: rgba(52, 152, 219, 0.05); border: 1px dashed rgba(52, 152, 219, 0.3); padding: 8px; text-align: center; border-radius: 8px; margin-bottom: 10px; }
        .status-text { font-size: 18px; color: var(--accent-blue); display: block; margin-bottom: 4px; }
        .status-badge { display: inline-block; padding: 4px 16px; background: #444; color: var(--text-main); border-radius: 20px; font-size: 18px; font-weight: bold; }
        .status-badge.loaded { background: var(--success-green); color: white; }
        .status-badge.error { background: var(--danger-red); color: white; }

        /* 主內容 */
        .main-content { display: none; margin-top: 5px; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 10px; }
        
        /* 頁籤按鈕 */
        .tab-btn { flex: 1; text-align: center; padding: 10px 15px; background: #333; border: none; border-radius: 6px; cursor: pointer; font-size: 22px; font-weight: bold; color: var(--text-main); }
        .tab-btn.active { background: var(--accent-blue); color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }

        /* 檢視區塊 */
        .view-section { background: var(--card-bg); padding: 12px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid var(--border-color); display: none; }
        .view-section.active { display: block; }
        
        /* 下拉選單區 */
        .personal-select-wrapper { margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .personal-select-wrapper label { font-size: 22px; font-weight: bold; white-space: nowrap; }
        select { width: 100%; padding: 8px 16px; font-size: 22px; font-weight: bold; border-radius: 6px; border: 2px solid var(--accent-blue); background: var(--card-bg); color: var(--text-main); outline: none; }
        
        /* 摘要統計卡片 */
        .summary-box { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 15px; }
        .summary-card { background: rgba(255,255,255,0.02); padding: 8px; border-radius: 6px; text-align: center; border: 1px solid var(--border-color); }
        .summary-card h4 { font-size: 16px; color: var(--text-muted); margin-bottom: 2px; }
        .summary-card p { font-size: 26px; font-weight: bold; color: var(--text-on-primary); }
        .new-count-text { color: var(--accent-blue); }
        .total-count-text { color: var(--accent-gold); }

        /* 明細標題藍色側邊條 */
        .section-title { margin: 15px 0 8px 0; font-size: 24px; font-weight: bold; color: var(--text-on-primary); border-left: 5px solid var(--accent-blue); padding-left: 10px; line-height: 1.3; }
        
        /* 桌機端標準表格 */
        .table-responsive { width: 100%; overflow-x: auto; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th, td { padding: 10px 8px; border-bottom: 1px solid var(--border-color); font-size: 22px; text-align: center; vertical-align: middle; }
        th { background-color: var(--table-header-bg); color: var(--text-main); font-weight: bold; } 
        td strong { font-size: 22px; color: var(--text-on-primary); }
        .no-data { color: var(--text-muted); text-align: center; padding: 15px; }
        
        /* 縮圖與操作按鈕 */
        .doc-thumbnail { height: 45px; width: auto; border-radius: 4px; cursor: pointer; transition: transform 0.2s; border: 1px solid var(--border-color); vertical-align: middle; }
        .doc-thumbnail:hover { transform: scale(1.1); }
        .btn-view { padding: 5px 14px; background-color: var(--accent-blue); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 20px; }

        /* 圖片放大燈箱 */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--overlay-bg); z-index: 9999; justify-content: center; align-items: center; }
        .overlay.active { display: flex; }
        .full-doc-image { max-width: 95%; max-height: 85%; border-radius: 6px; border: 2px solid #fff; object-fit: contain; }
        .overlay-close-btn { position: absolute; top: 20px; right: 25px; color: #fff; font-size: 45px; font-weight: bold; cursor: pointer; }

        /* === 手機/平板端 RWD 響應式：精準重現截圖中的垂直疊放排版 === */
        @media (max-width: 768px) {
            * { font-size: 18px; }
            header h1 { font-size: 22px; }
            body { padding: 6px; }
            .summary-card p { font-size: 22px; }
            .section-title { font-size: 20px; }
            
            /* 將表格欄位打破，改用彈性盒垂直疊放 */
            .rwd-table thead { display: none; } /* 隱藏傳統表頭 */
            .rwd-table tbody tr { display: flex; flex-direction: row; flex-wrap: wrap; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.01); border: 1px solid var(--border-color); border-radius: 6px; margin-bottom: 10px; padding: 10px; }
            .rwd-table td { display: block; width: auto; border: none; padding: 4px 2px; font-size: 18px; text-align: center; }
            
            /* 讓特定的欄位名稱轉為直書垂直排列（完美重現曹老師那張截圖） */
            .rwd-table td.vertical-header { display: inline-flex; flex-direction: column; justify-content: center; width: 2.5em; font-size: 16px; color: var(--text-muted); line-height: 1.1; margin: 0 5px; }
            .rwd-table td.vertical-header span { font-size: 16px; }

            /* 針對命題明細微調 */
            .exam-row td { width: 50%; font-size: 20px; text-align: center; padding: 8px 0; }
        }

        /* 電腦端多欄位展開 */
        @media (min-width: 769px) {
            .summary-box { grid-template-columns: repeat(4, 1fr); }
            .personal-select-wrapper { width: 50%; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="system-title">114學年度--研習次數記錄</h1>
    </header>

    <div class="status-zone">
        <span id="status-text" class="status-text">🌐 資料庫連線狀態...</span>
        <span id="file-status" class="status-badge">正在讀取...</span>
    </div>

    <div class="main-content" id="main-content">
        <div class="nav-tabs">
            <button class="tab-btn" onclick="switchView('overview')">全體總覽</button>
            <button class="tab-btn active" onclick="switchView('personal')">個人紀錄</button>
        </div>

        <div id="overview-view" class="view-section">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>序號</th>
                            <th>姓名</th>
                            <th>研習總次數</th>
                            <th>歷史命題</th>
                            <th>今年命題</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="overview-tbody"></tbody>
                </table>
            </div>
        </div>

        <div id="personal-view" class="view-section active">
            <div class="personal-select-wrapper">
                <label for="teacher-select">請選擇教師：</label>
                <select id="teacher-select" onchange="renderPersonalData(this.value)"></select>
            </div>
            
            <div class="summary-box">
                <div class="summary-card"><h4>研習人員</h4><p id="card-name">---</p></div>
                <div class="summary-card"><h4>去年累計</h4><p id="card-prev">0</p></div>
                <div class="summary-card"><h4>今年新增</h4><p id="card-new" class="new-count-text">+0</p></div>
                <div class="summary-card"><h4>總次數</h4><p id="card-total" class="total-count-text">0</p></div>
            </div>
            
            <div class="section-title">本學年度研習明細</div>
            <div class="table-responsive">
                <table class="rwd-table">
                    <thead>
                        <tr>
                            <th>研習日期</th>
                            <th>研習天數</th>
                            <th>研習時數</th>
                            <th>採計次數</th>
                            <th style="color: var(--danger-red);">研習公文 (點圖)</th>
                            <th style="color: var(--success-green);">研習結果 (驗證)</th>
                        </tr>
                    </thead>
                    <tbody id="seminar-tbody"></tbody>
                </table>
            </div>

            <div class="section-title" style="border-left-color: var(--accent-gold);">本學年度命題明細</div>
            <div class="table-responsive">
                <table class="rwd-table">
                    <thead>
                        <tr>
                            <th>歷史命題累計</th>
                            <th>115學年出題次數 (今年)</th>
                            <th>命題總累計</th>
                        </tr>
                    </thead>
                    <tbody id="exam-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="doc-overlay" class="overlay" onclick="closeDoc()">
    <span class="overlay-close-btn">&times;</span>
    <img src="" alt="放大圖" id="full-doc-image" class="full-doc-image">
</div>

<script>
    let systemData = []; 
    const excelFileName = '114_teacher_record.xlsx';

    window.addEventListener('DOMContentLoaded', () => {
        fetch(excelFileName)
            .then(response => {
                if (!response.ok) throw new Error('找不到 Excel 資料庫。');
                return response.arrayBuffer();
            })
            .then(buffer => {
                const data = new Uint8Array(buffer);
                const workbook = XLSX.read(data, { type: 'array' });
                
                // 讀取三個 Sheet
                const sheetTeachers = XLSX.utils.sheet_to_json(workbook.Sheets["教師名稱"] || workbook.Sheets[0]);
                const sheetRecords = XLSX.utils.sheet_to_json(workbook.Sheets["研習紀錄"] || []);
                const sheetExams = XLSX.utils.sheet_to_json(workbook.Sheets["段考命題"] || []);
                
                // 整合資料結構
                mergeData(sheetTeachers, sheetRecords, sheetExams);

                document.getElementById('file-status').textContent = `成功同步雲端資料...`;
                document.getElementById('file-status').className = "status-badge loaded";
                document.getElementById('main-content').style.display = "block";

                refreshUI();
            })
            .catch(error => {
                console.error(error);
                document.getElementById('file-status').textContent = `連線失敗`;
                document.getElementById('file-status').className = "status-badge error";
            });
    });

    function mergeData(teachers, records, exams) {
        systemData = teachers.map(t => {
            const id = String(t["職碼"] || "").trim();
            const name = String(t["姓名"] || "").trim();
            const seminarPrev = parseInt(t["歷史截止累計"]) || 0;

            // 1. 篩選研習明細
            const matchedRecords = records.filter(r => String(r["姓名"] || "").trim() === name).map(r => ({
                date: String(r["研習日期"] || "").trim(),
                item: String(r["研習天數"] || r["研習天數項目"] || "").trim(),
                hours: String(r["研習時數"] || "").trim(),
                count: parseInt(r["採計次數"]) || 0,
                document: String(r["研習公文"] || "").trim(),
                resultDoc: String(r["研習結果"] || "").trim() 
            })).filter(r => r.date !== "");

            // 2. 篩選段考命題 (對應最新工作表結構)
            const matchedExamRow = exams.find(e => String(e["職碼"] || "").trim() === id || String(e["姓名"] || "").trim() === name);
            const examPrev = matchedExamRow ? (parseInt(matchedExamRow["114 出題次數"]) || 0) : 0;
            const examNew = matchedExamRow ? (parseInt(matchedExamRow["115 出題次數"]) || 0) : 0;

            return { id, name, seminarPrev, records: matchedRecords, examPrev, examNew };
        }).filter(t => t.id !== "");
    }

    function refreshUI() {
        renderOverviewTable();
        populateTeacherSelect();
        const select = document.getElementById('teacher-select');
        if (select.options.length > 0) renderPersonalData(select.value);
    }

    function switchView(viewType) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
        if(viewType === 'overview') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('overview-view').classList.add('active');
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('personal-view').classList.add('active');
        }
    }

    function populateTeacherSelect() {
        const select = document.getElementById('teacher-select');
        select.innerHTML = '';
        systemData.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t.id;
            opt.textContent = `職碼 ${t.id} - ${t.name}`;
            select.appendChild(opt);
        });
    }

    function renderOverviewTable() {
        const tbody = document.getElementById('overview-tbody');
        tbody.innerHTML = '';
        systemData.forEach(t => {
            const semNew = t.records.reduce((sum, r) => sum + r.count, 0);
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${t.id}</strong></td>
                <td><strong>${t.name}</strong></td>
                <td><span class="total-count-text">${t.seminarPrev + semNew} 次</span></td>
                <td>${t.examPrev} 次</td>
                <td>+${t.examNew} 次</td>
                <td><button class="btn-view" onclick="viewDetail('${t.id}')">檢視</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function viewDetail(id) {
        document.getElementById('teacher-select').value = id;
        renderPersonalData(id);
        switchView('personal');
    }

    // 核心渲染：同時產出研習與命題表格，並相容手機端直書排列
    function renderPersonalData(id) {
        const t = systemData.find(teacher => teacher.id === id);
        if (!t) return;

        const semNew = t.records.reduce((sum, r) => sum + r.count, 0);
        
        // 更新大字卡
        document.getElementById('card-name').textContent = t.name;
        document.getElementById('card-prev').textContent = t.seminarPrev;
        document.getElementById('card-new').textContent = `+${semNew}`;
        document.getElementById('card-total').textContent = t.seminarPrev + semNew;

        // 渲染研習明細
        const semTbody = document.getElementById('seminar-tbody');
        semTbody.innerHTML = '';
        if(t.records.length === 0) {
            semTbody.innerHTML = `<tr><td colspan="6" class="no-data">目前無研習明細紀錄</td></tr>`;
        } else {
            t.records.forEach(r => {
                const docImg = r.document ? `<img src="docs/${r.document}" class="doc-thumbnail" onclick="openDoc('docs', '${r.document}')">` : '---';
                const resImg = r.resultDoc ? `<img src="docs_result/${r.resultDoc}" class="doc-thumbnail" onclick="openDoc('docs_result', '${r.resultDoc}')">` : '---';
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${r.date}</strong></td>
                    <td>${r.item}</td>
                    <td>${r.hours}</td>
                    <td><strong>+${r.count} 次</strong></td>
                    <td class="vertical-header"><span style="color:var(--danger-red)">研習</span><span style="color:var(--danger-red)">公文</span></td>
                    <td>${docImg}</td>
                    <td class="vertical-header"><span style="color:var(--success-green)">研習</span><span style="color:var(--success-green)">結果</span></td>
                    <td>${resImg}</td>
                `;
                semTbody.appendChild(tr);
            });
        }

        // 渲染段考命題明細
        const examTbody = document.getElementById('exam-tbody');
        examTbody.innerHTML = `
            <tr class="exam-row">
                <td>歷史命題：<strong>${t.examPrev} 次</strong></td>
                <td>本年新增：<strong style="color:var(--accent-blue);">+${t.examNew} 次</strong></td>
                <td>命題總累計：<strong style="color:var(--accent-gold);">${t.examPrev + t.examNew} 次</strong></td>
            </tr>
        `;
    }

    function openDoc(folder, file) {
        const overlay = document.getElementById('doc-overlay');
        document.getElementById('full-doc-image').src = `${folder}/${file}`;
        overlay.classList.add('active');
    }

    function closeDoc() {
        document.getElementById('doc-overlay').classList.remove('active');
    }
</script>
</body>
</html>
