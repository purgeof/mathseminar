<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115學年度 - 段考命題輪值表格系統</title>
    <style>
        /* 全域基本樣式（維持原本系統的深色主題） */
        body {
            background-color: #141414;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 頂部學年度大標題 */
        .header-title {
            background-color: #222222;
            color: #ffffff;
            width: 100%;
            max-width: 1000px;
            text-align: center;
            padding: 15px 0;
            font-size: 24px;
            font-weight: bold;
            border-radius: 6px;
            margin-bottom: 12px;
            border: 1px solid #2d2d2d;
        }

        /* 雲端同步狀態列 */
        .status-bar {
            background-color: #1a1a1a;
            color: #2ed573;
            font-weight: bold;
            width: 100%;
            max-width: 1000px;
            text-align: center;
            padding: 10px 0;
            font-size: 14px;
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid #222222;
        }

        /* 系統頁籤按鈕容器 */
        .tab-btn-container {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 20px;
        }

        /* 階段切換按鈕基本樣式 */
        .tab-btn {
            flex: 1;
            background-color: #2a2a2a;
            color: #aaaaaa;
            border: 1px solid #3a3a3a;
            padding: 12px 0;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        /* 作用中的按鈕樣式（如圖中的紫色按鈕） */
        .tab-btn.active {
            background-color: #8e44ad;
            color: #ffffff;
            border-color: #9b59b6;
        }

        .tab-btn:hover:not(.active) {
            background-color: #333333;
            color: #ffffff;
        }

        /* 階段標題（如：111 ~ 115年_命題4次） */
        .table-section-title {
            width: 100%;
            max-width: 1000px;
            font-size: 18px;
            font-weight: bold;
            border-left: 4px solid #8e44ad;
            padding-left: 10px;
            margin-bottom: 15px;
            color: #e0e0e0;
        }

        /* 表格容器，處理溢出 */
        .table-responsive {
            width: 100%;
            max-width: 1000px;
            overflow-x: auto;
            border-radius: 6px;
            border: 1px solid #2d2d2d;
            background-color: #1a1a1a;
        }

        /* 標準橫向表格樣式 */
        .duty-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            table-layout: fixed; /* 固定欄寬，確保每一年份寬度完全一樣 */
        }

        /* 表頭年份（TH）樣式 */
        .duty-table th {
            background-color: #222222;
            color: #999999;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            padding: 12px;
            border-bottom: 2px solid #2d2d2d;
            border-right: 1px solid #2d2d2d;
        }
        .duty-table th:last-child {
            border-right: none;
        }

        /* 藍色高亮當前年度（例如 115 年）的表頭 */
        .duty-table th.current-year {
            color: #54a0ff;
            border-bottom: 2px solid #54a0ff;
        }

        /* 表格單元格（TD）基本樣式 */
        .duty-table td {
            padding: 6px;
            vertical-align: top;
            border-right: 1px solid #2d2d2d;
            background-color: #111111;
        }
        .duty-table td:last-child {
            border-right: none;
        }

        /* 5位老師垂直排版容器 */
        .cell-teachers-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        /* 每位老師的橫向列項目（名字靠左，數字靠右） */
        .cell-teacher-item {
            display: flex;
            justify-content: space-between; /* 精髓：名字與數字各貼兩端 */
            align-items: center;
            padding: 8px 12px;
            font-size: 15px;
            border-radius: 4px;
        }

        /* 負責該年命題的老師（4次）突顯樣式 */
        .status-4times {
            color: #ffffff;
            font-weight: bold;
            background-color: #1c1c1c; /* 稍微亮一點的背景襯托 */
        }
        /* 數字 4 的顏色（鮮明橘黃） */
        .status-4times .num-tag {
            color: #ff9f43;
            font-weight: 900;
        }

        /* 未負責該年命題的老師（3次）低調樣式 */
        .status-3times {
            color: #666666; /* 灰字，做出層次感 */
        }
        /* 數字 3 的顏色（低調暗灰） */
        .status-3times .num-tag {
            color: #444444;
        }

        /* 數字等寬字型，確保右側排列完全對齊 */
        .num-tag {
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="header-title">115學年度</div>

    <div class="status-bar">✓ 成功同步雲端資料...</div>

    <div class="tab-btn-container">
        <button class="tab-btn active" onclick="switchStage(1, '111 ~ 115年')">111 ~ 115年</button>
        <button class="tab-btn" onclick="switchStage(2, '116 ~ 120年')">116 ~ 120年</button>
        <button class="tab-btn" onclick="switchStage(3, '121 ~ 125年')">121 ~ 125年</button>
    </div>

    <div class="table-section-title" id="sectionTitle">111 ~ 115年 命題次數對照</div>

    <div class="table-responsive">
        <table class="duty-table">
            <thead>
                <tr id="tableHeaderRow">
                    </tr>
            </thead>
            <tbody>
                <tr id="tableBodyRow">
                    </tr>
            </tbody>
        </table>
    </div>

    <script>
        // 1. 定義系統內固定的 5 位老師完整名單
        const allTeachers = ["盧○", "李○", "蘭○", "曹○", "張○"];

        // 2. 定義 111~125 年，每年負責命題的 2 位老師（這 2 位拿 4 次，其餘 3 位拿 3 次）
        const yearlyDutyData = {
            111: ["盧○", "李○"],
            112: ["蘭○", "曹○"],
            113: ["張○", "盧○"],
            114: ["李○", "蘭○"],
            115: ["曹○", "張○"],
            
            116: ["盧○", "李○"],
            117: ["蘭○", "曹○"],
            118: ["張○", "盧○"],
            119: ["李○", "蘭○"],
            120: ["曹○", "張○"],
            
            121: ["盧○", "李○"],
            122: ["蘭○", "曹○"],
            123: ["張○", "盧○"],
            124: ["李○", "蘭○"],
            125: ["曹○", "張○"]
        };

        // 當前的學年度（用來讓表格表頭的該年份文字變藍色高亮）
        const currentSystemYear = 115;

        /**
         * 核心：切換階段並渲染橫向表格
         * @param {number} stageNum 階段代號 (1, 2, 3)
         * @param {string} stageText 階段文字描述
         */
        function switchStage(stageNum, stageText) {
            // 1. 更新按鈕的選取狀態 (Active 樣式變換)
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach((btn, index) => {
                if (index === (stageNum - 1)) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // 2. 更新區塊標題文字
            document.getElementById("sectionTitle").innerText = `${stageText} 命題次數對照`;

            // 3. 計算該階段的起始與結束年份
            let startYear = 111;
            if (stageNum === 2) startYear = 116;
            if (stageNum === 3) startYear = 121;
            let endYear = startYear + 4;

            let headerHtml = "";
            let bodyHtml = "";

            // 4. 開始橫向跑這 5 個年份的迴圈，組裝成 <th> 與 <td>
            for (let year = startYear; year <= endYear; year++) {
                
                // 判斷是否為當前學年度，如果是就加上變藍色的 class
                const isCurrent = (year === currentSystemYear) ? "current-year" : "";
                headerHtml += `<th class="${isCurrent}">${year} 年</th>`;

                // 取出該年負責的 2 位老師
                const dutyActive = yearlyDutyData[year] || [];
                
                // 排序整理：先排負責的 2 人 (4次)，再補上剩下的 3 人 (3次)
                const sortedList = [];
                dutyActive.forEach(name => {
                    sortedList.push({ name: name, count: 4, isActive: true });
                });
                allTeachers.forEach(name => {
                    if (!dutyActive.includes(name)) {
                        sortedList.push({ name: name, count: 3, isActive: false });
                    }
                });

                // 開始建立該年份 TD 內部的 5 位老師垂直列表結構
                bodyHtml += `<td>`;
                bodyHtml += `<div class="cell-teachers-list">`;
                
                sortedList.forEach(item => {
                    const statusClass = item.isActive ? 'status-4times' : 'status-3times';
                    bodyHtml += `
                        <div class="cell-teacher-item ${statusClass}">
                            <span class="teacher-name">${item.name}</span>
                            <span class="num-tag">${item.count}</span>
                        </div>
                    `;
                });

                bodyHtml += `</div>`;
                bodyHtml += `</td>`;
            }

            // 5. 將組裝好的 HTML 灌入網頁表格
            document.getElementById("tableHeaderRow").innerHTML = headerHtml;
            document.getElementById("tableBodyRow").innerHTML = bodyHtml;
        }

        // 頁面初次載入時，預設顯示第一階段 (111~115年) 的橫向表格
        window.onload = function() {
            switchStage(1, '111 ~ 115年');
        };
    </script>
</body>
</html>
