<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>115學年</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        /* ==========================================================================
           1. 全域樣式與專業星空深灰風格定義 (RWD 優化)
           ========================================================================== */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --table-bg: #252525;
            --primary-blue: #3498db;
            --accent-purple: #9b59b6;
            --success-green: #2ecc71;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft JhengHei", sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 15px; display: flex; flex-direction: column; align-items: center;font-size: 18px; }
        .container { width: 100%; max-width: 1000px; }

        /* 標題與同步標籤 */
        .header-title { background-color: #2a2a2a; text-align: center; padding: 15px; font-size: 22px; font-weight: bold; border-radius: 8px; margin-bottom: 12px; }
        .sync-status { display: block; width: fit-content; margin: 0 auto 20px auto; padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; }
        .sync-loading { background: #333; color: #888; }
        .sync-success { background: #10b981; color: white; box-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }

        /* 主功能頁籤 (全體/個人) */
        .tab-system { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: #333; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--primary-blue); }

        .page-content { display: none; }
        .page-content.active { display: block; }

        /* 下拉選單 */
        .select-container { margin-bottom: 15px; }
        .select-input { background: #1a1a1a; color: white; border: 1px solid var(--primary-blue); padding: 10px; border-radius: 6px; width: 100%; max-width: 400px; outline: none; }

        /* 子分頁切換 (研習紀錄/命題次數) */
        .sub-tab-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .sub-tab-btn { padding: 8px 16px; background: #333; color: #ccc; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .sub-tab-btn.active[data-type="study"] { background: #2980b9; color: white; }
        .sub-tab-btn.active[data-type="exam"] { background: var(--accent-purple); color: white; }

        /* 統計卡片 */
        .mini-summary-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .mini-card { flex: 1; min-width: 100px; background: #242424; border: 1px solid #2d2d2d; border-radius: 8px; padding: 12px; text-align: center; }
        .mini-card .label { font-size: 12px; color: #888; margin-bottom: 6px; }
        .mini-card .value { font-size: 18px; font-weight: bold; }

        /* ==========================================================================
           2. 命題次數矩陣 (RWD 終極優化)
           ========================================================================== */
        .matrix-wrapper { width: 100%; overflow: hidden; padding: 2px; }
        .matrix-table { width: 100%; table-layout: fixed; border-collapse: collapse; background: #1e1e1e; }
        .matrix-table th { background: #252525; color: var(--primary-blue); font-size: 14px; padding: 10px 2px; border: 1px solid #2d2d2d; }
        .matrix-table td { padding: 12px 1px; text-align: center; border: 1px solid #2d2d2d; font-size: 14px; color: #eee; }
        .bg-duty { background: #292929; } /* 出題4次的列 */
        .cell-content { display: flex; align-items: center; justify-content: center; gap: 2px; flex-wrap: wrap; }
        .count-badge { color: #f39c12; font-weight: bold; font-size: 13px; }
        .highlight-teacher { background: var(--accent-purple); color: white; border-radius: 4px; padding: 2px 4px; font-weight: bold; }

        /* 研習明細圖片 (圓形化) */
        .doc-thumbnail { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #444; cursor: pointer; transition: transform 0.2s; vertical-align: middle; }
        .doc-thumbnail:hover { transform: scale(2.5); border-color: var(--primary-blue); z-index: 100; position: relative; border-radius: 4px; }

        /* 表格通用 */
        .main-table, .detail-table { width: 100%; border-collapse: collapse; background: #242424; border-radius: 8px; overflow: hidden; margin-top: 10px; }
        .main-table th, .detail-table th { background: #2d2d2d; color: #888; padding: 12px; font-size: 14px; }
        .main-table td, .detail-table td { padding: 12px; text-align: center; border-bottom: 1px solid #2d2d2d; font-size: 14px; }

        /* 手機專屬斷點 */
        @media screen and (max-width: 480px) {
            .matrix-table th { font-size: 12px; }
            .matrix-table td { font-size: 12px; padding: 10px 1px; }
            .count-badge { font-size: 11px; }
            .mini-card { min-width: 80px; padding: 8px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-title">115學年度</div>
        <div id="syncIndicator" class="sync-status sync-loading">正在同步資料...</div>

        <div class="tab-system">
            <button class="tab-btn active" onclick="switchMainTab('all')">全體總覽</button>
            <button class="tab-btn" onclick="switchMainTab('personal')">個人紀錄</button>
        </div>

        <div id="pageAll" class="page-content active">
            <table class="main-table">
                <thead>
                    <tr><th style="width:15%">序號</th><th style="width:30%">姓名</th><th style="width:35%">研習<BR>總數</th><th style="width:20%">操作</th></tr>
                </thead>
                <tbody id="allTeacherRows"></tbody>
            </table>
        </div>

        <div id="pagePersonal" class="page-content">
            <div class="select-container">
                <label>請選擇教師：</label>
                <select id="teacherSelect" class="select-input" onchange="loadTeacherData()"></select>
            </div>

            <div class="sub-tab-container">
                <button id="subTabStudy" class="sub-tab-btn active" data-type="study" onclick="switchSubTab('study')">📘 研習紀錄</button>
                <button id="subTabExam" class="sub-tab-btn" data-type="exam" onclick="switchSubTab('exam')">📝 命題次數</button>
            </div>

            <div class="mini-summary-row">
                <div class="mini-card">
                    <div id="cardNameLabel" class="label">研習人員</div>
                    <div id="cardTeacherName" class="value">--</div>
                </div>
                <div class="mini-card" id="cardLeftBox">
                    <div id="cardLeftLabel" class="label">去年累計</div>
                    <div id="cardLeftValue" class="value" style="color:#3498db">--</div>
                </div>
                <div class="mini-card" id="cardRightBox">
                    <div id="cardRightLabel" class="label">今年新增</div>
                    <div id="cardRightValue" class="value" style="color:#f39c12">--</div>
                </div>
                <div class="mini-card">
                    <div id="totalLabelText" class="label">總次數</div>
                    <div id="cardTotalValue" class="value" style="color:#f1c40f">--</div>
                </div>
            </div>

            <div id="subContentStudy">
                <div style="font-size:18px; font-weight:bold; border-left:4px solid #3498db; padding-left:10px; margin-bottom:10px;">今年研習明細</div>
                <table class="detail-table">
                    <thead>
                        <tr><th>研習<BR>日期</th><th>研習<BR>天數</th><th>研習<BR>時數</th><th>採計<BR>次數</th><th>研習<BR>公文</th><th>研習<BR>結果</th></tr>
                    </thead>
                    <tbody id="studyDetailRows"></tbody>
                </table>
            </div>

            <div id="subContentExam" style="display:none">
                <div class="phase-btn-group" style="display:flex; gap:8px; margin-bottom:15px; flex-wrap:wrap;">
                    <button class="sub-tab-btn active" onclick="switchPhase(1, '111 ~ 115年')">111 ~ 115年</button>
                    <button class="sub-tab-btn" onclick="switchPhase(2, '116 ~ 120年')">116 ~ 120年</button>
                    <button class="sub-tab-btn" onclick="switchPhase(3, '121 ~ 125年')">121 ~ 125年</button>
                </div>
                <div class="matrix-wrapper">
                    <div id="matrixTitleText" style="font-size:15px; font-weight:bold; margin-bottom:12px; padding-left:6px; border-left:3px solid #9b59b6;">111~115年_命題次數</div>
                    <table class="matrix-table">
                        <thead id="matrixHead"></thead>
                        <tbody id="matrixBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let excelRawData = []; // 存研習紀錄
        let teachersMaster = []; // 存教師名稱
        let baseOrder = []; // 存命題排班基礎順序
        let computedExamMatrix = {};
        let teacherExamScoresCache = {};
        let currentPhase = 1;

        window.addEventListener('DOMContentLoaded', () => {
            fetchExcel();
        });

        function fetchExcel() {
            fetch('114_teacher_record.xlsx')
                .then(res => res.arrayBuffer())
                .then(buffer => {
                    const workbook = XLSX.read(new Uint8Array(buffer), { type: 'array' });
                    
                    // 解析三個分頁
                    excelRawData = XLSX.utils.sheet_to_json(workbook.Sheets["研習紀錄"] || workbook.Sheets[0]);
                    teachersMaster = XLSX.utils.sheet_to_json(workbook.Sheets["教師名稱"] || []);
                    const dutyOrderSheet = XLSX.utils.sheet_to_json(workbook.Sheets["命題排班"] || []);
                    baseOrder = dutyOrderSheet.map(d => d.TeacherName);

                    // 演算法計算命題矩陣
                    calculateExamLogic();

                    // 更新 UI
                    document.getElementById('syncIndicator').innerText = "成功同步雲端資料庫...";
                    document.getElementById('syncIndicator').className = "sync-status sync-success";
                    
                    initSystem();
                });
        }

        function calculateExamLogic() {
            const startYear = 111;
            const endYear = 125;
            computedExamMatrix = {
                1: { years: ["111 年", "112 年", "113 年", "114 年", "115 年"], rows: [[],[],[],[],[]] },
                2: { years: ["116 年", "117 年", "118 年", "119 年", "120 年"], rows: [[],[],[],[],[]] },
                3: { years: ["121 年", "122 年", "123 年", "124 年", "125 年"], rows: [[],[],[],[],[]] }
            };
            
            baseOrder.forEach(name => teacherExamScoresCache[name] = 0);

            for (let y = startYear; y <= endYear; y++) {
                const diff = y - startYear;
                const shift = (diff * 2) % 5;
                let yearOrder = [];
                for (let i = 0; i < 5; i++) {
                    yearOrder.push(baseOrder[(i + shift) % 5]);
                }

                // 微調 112, 114 等年份符合歷史表格習慣
                if (shift === 2 || shift === 1) {
                    [yearOrder[2], yearOrder[3]] = [yearOrder[3], yearOrder[2]];
                }

                let phaseId = y <= 115 ? 1 : (y <= 120 ? 2 : 3);
                const colIdx = y - (phaseId === 1 ? 111 : (phaseId === 2 ? 116 : 121));

                for (let r = 0; r < 5; r++) {
                    const score = r < 2 ? 4 : 3;
                    computedExamMatrix[phaseId].rows[r][colIdx] = { name: yearOrder[r], score: score };
                    teacherExamScoresCache[yearOrder[r]] += score;
                }
            }
        }

        function initSystem() {
            const select = document.getElementById('teacherSelect');
            select.innerHTML = "";
            teachersMaster.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t["姓名"];
                opt.text = `職碼 ${t["職碼"]} - ${t["姓名"]}`;
                select.appendChild(opt);
            });
            renderAllOverview();
            loadTeacherData();
        }

        function renderAllOverview() {
            const tbody = document.getElementById('allTeacherRows');
            tbody.innerHTML = "";
            teachersMaster.forEach((t, i) => {
                const name = t["姓名"];
                const baseSum = parseInt(t["歷史截止累計"] || 0);
                const currentSum = excelRawData.filter(d => d["姓名"] === name).reduce((sum, d) => sum + parseInt(d["採計次數"] || 0), 0);
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${i+1}</td><td>${name}</td><td>${baseSum + currentSum} 次</td><td><button class="btn-view" style="background:#3498db; color:white; border:none; padding:4px 10px; border-radius:4px; cursor:pointer;" onclick="viewDetail('${name}')">檢視</button></td>`;
                tbody.appendChild(tr);
            });
        }

        function viewDetail(name) {
            document.getElementById('teacherSelect').value = name;
            switchMainTab('personal');
            loadTeacherData();
        }

        function switchMainTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.page-content').forEach(p => b = p.classList.remove('active'));
            if(tab === 'all') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('pageAll').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('pagePersonal').classList.add('active');
            }
        }

        function switchSubTab(type) {
            document.getElementById('subTabStudy').classList.remove('active');
            document.getElementById('subTabExam').classList.remove('active');
            document.getElementById('subContentStudy').style.display = 'none';
            document.getElementById('subContentExam').style.display = 'none';
            
            if(type === 'study') {
                document.getElementById('subTabStudy').classList.add('active');
                document.getElementById('subContentStudy').style.display = 'block';
            } else {
                document.getElementById('subTabExam').classList.add('active');
                document.getElementById('subContentExam').style.display = 'block';
            }
            loadTeacherData();
        }

        function loadTeacherData() {
            const name = document.getElementById('teacherSelect').value;
            document.getElementById('cardTeacherName').innerText = name;
            
            const isStudy = document.getElementById('subTabStudy').classList.contains('active');

            if(isStudy) {
                document.getElementById('cardNameLabel').innerText = "研習人員";
                document.getElementById('cardLeftBox').style.display = "block";
                document.getElementById('cardRightBox').style.display = "block";
                document.getElementById('totalLabelText').innerText = "總次數";
                
                const tInfo = teachersMaster.find(t => t["姓名"] === name);
                const lastYear = parseInt(tInfo["歷史截止累計"] || 0);
                const records = excelRawData.filter(d => d["姓名"] === name);
                const thisYear = records.reduce((sum, d) => sum + parseInt(d["採計次數"] || 0), 0);

                document.getElementById('cardLeftValue').innerText = lastYear + "次";
                document.getElementById('cardRightValue').innerText = "+" + thisYear + "次";
                document.getElementById('cardTotalValue').innerText = lastYear + thisYear;

                renderStudyTable(records);
            } else {
                document.getElementById('cardNameLabel').innerText = "命題人員";
                document.getElementById('cardLeftBox').style.display = "none";
                document.getElementById('cardRightBox').style.display = "none";
                document.getElementById('totalLabelText').innerText = "111-125年累計";
                document.getElementById('cardTotalValue').innerText = (teacherExamScoresCache[name] || 0) + "次";
                renderMatrix(name);
            }
        }

        function renderStudyTable(records) {
            const tbody = document.getElementById('studyDetailRows');
            tbody.innerHTML = records.length ? "" : '<tr><td colspan="6">今年暫無紀錄</td></tr>';
            records.forEach(r => {
                const docImg = r["研習公文"] ? `<img src="docs/${r["研習公文"]}" class="doc-thumbnail" onclick="window.open(this.src)">` : "---";
                const resImg = r["研習結果"] ? `<img src="docs_result/${r["研習結果"]}" class="doc-thumbnail" onclick="window.open(this.src)">` : "---";
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${r["研習日期"]}</td><td>${r["研習天數"]}</td><td>${r["研習時數"]}</td><td style="color:#2ecc71; font-weight:bold">+${r["採計次數"]}次</td><td>${docImg}</td><td>${resImg}</td>`;
                tbody.appendChild(tr);
            });
        }

        function switchPhase(p, text) {
            currentPhase = p;
            document.querySelectorAll('.phase-btn-group .sub-tab-btn').forEach((b,i) => {
                if(i === p-1) b.classList.add('active'); else b.classList.remove('active');
            });
            document.getElementById('matrixTitleText').innerText = `${text} 命題次數`;
            renderMatrix(document.getElementById('teacherSelect').value);
        }

        function renderMatrix(selectedName) {
            const head = document.getElementById('matrixHead');
            const body = document.getElementById('matrixBody');
            const data = computedExamMatrix[currentPhase];
            
            head.innerHTML = "<tr>" + data.years.map(y => `<th>${y}</th>`).join('') + "</tr>";
            
            let html = "";
            data.rows.forEach((row, rIdx) => {
                html += `<tr class="${rIdx < 2 ? 'bg-duty' : ''}">`;
                row.forEach(cell => {
                    const isTarget = cell.name === selectedName;
                    html += `<td><div class="cell-content"><span class="${isTarget ? 'highlight-teacher' : ''}">${cell.name}</span><span class="count-badge">${cell.score}</span></div></td>`;
                });
                html += "</tr>";
            });
            body.innerHTML = html;
        }
    </script>
</body>
</html>
