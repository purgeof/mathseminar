<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115學年度研習與命題輪值系統</title>
    <style>
        /* ==========================================================================
           1. 全域樣式與專業星空深灰風格定義
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: #121212;
            color: #e0e0e0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        /* 學年度大標題 */
        .header-title {
            width: 100%;
            text-align: center;
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #ffffff;
            letter-spacing: 1px;
        }

        /* 同步狀態標籤 */
        .sync-status {
            display: block;
            width: fit-content;
            margin: 0 auto 20px auto;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .sync-loading {
            background-color: #3a3a3a;
            color: #aaaaaa;
            border: 1px dashed #666;
        }
        .sync-success {
            background-color: #10b981;
            color: #ffffff;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }

        /* ==========================================================================
           2. 主分頁切換按鈕 (全體總覽 / 個人紀錄)
           ========================================================================== */
        .tab-system {
            display: flex;
            width: 100%;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background-color: #333333;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
        }

        .tab-btn.active {
            background-color: #3498db;
            color: white;
        }

        .page-content {
            display: none;
        }

        .page-content.active {
            display: block;
        }

        /* ==========================================================================
           3. 全體總覽頁面樣式
           ========================================================================== */
        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            padding-left: 8px;
            border-left: 4px solid #3498db;
        }

        .main-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background-color: #242424;
            border-radius: 8px;
            overflow: hidden;
        }

        .main-table th {
            background-color: #2d2d2d;
            color: #aaaaaa;
            font-weight: bold;
            padding: 14px;
            font-size: 15px;
            border-bottom: 2px solid #1a1a1a;
        }

        .main-table td {
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid #2d2d2d;
            font-size: 15px;
        }

        .btn-view {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        /* ==========================================================================
           4. 個人紀錄頁面樣式設定
           ========================================================================== */
        .select-container {
            margin-bottom: 15px;
            font-size: 16px;
        }

        .select-input {
            background-color: #1a1a1a;
            color: #ffffff;
            border: 1px solid #3498db;
            padding: 10px;
            border-radius: 6px;
            width: 100%;
            max-width: 400px;
            font-size: 15px;
            outline: none;
        }

        /* 子功能切換鈕 (研習紀錄 / 命題次數) */
        .sub-tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .sub-tab-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background-color: #333333;
            color: #cccccc;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .sub-tab-btn.active[data-type="study"] {
            background-color: #2980b9;
            color: white;
        }

        .sub-tab-btn.active[data-type="exam"] {
            background-color: #9b59b6;
            color: white;
        }

        /* 核心統計迷你卡片 (已過濾掉不要的欄位，僅保留必要的緊湊資訊) */
        .mini-summary-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .mini-card {
            flex: 1;
            min-width: 120px;
            background-color: #242424;
            border: 1px solid #2d2d2d;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .mini-card .label {
            font-size: 12px;
            color: #888888;
            margin-bottom: 6px;
        }

        .mini-card .value {
            font-size: 20px;
            font-weight: bold;
        }
        .text-orange { color: #f39c12; }
        .text-blue { color: #3498db; }

        /* 階段切換按鈕區域 */
        .phase-btn-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .phase-btn {
            background-color: #2c2c2c;
            color: #bbbbbb;
            border: 1px solid #3d3d3d;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .phase-btn.active {
            background-color: #9b59b6;
            color: white;
            border-color: #9b59b6;
        }

        /* ==========================================================================
           5. 核心響應式網頁設計 (RWD) 命題對照表佈局 (自動抓取並完美適應各種螢幕)
           ========================================================================== */
        .matrix-wrapper {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            padding: 2px;
            overflow: hidden; /* 徹底杜絕橫向捲軸 */
        }

        .matrix-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            padding-left: 6px;
            border-left: 3px solid #9b59b6;
        }

        .matrix-table {
            width: 100%;
            table-layout: fixed; /* 關鍵：強制各年份欄位絕對均分寬度，不被內容撐開 */
            border-collapse: collapse;
            box-sizing: border-box;
            background-color: #1e1e1e;
        }

        .matrix-table th {
            background-color: #252525;
            color: #3498db;
            font-weight: bold;
            padding: 10px 4px;
            font-size: 14px;
            border: 1px solid #2d2d2d;
            text-align: center;
        }

        .matrix-table td {
            padding: 12px 4px;
            text-align: center;
            border: 1px solid #2d2d2d;
            font-size: 14px;
            color: #ffffff;
            word-break: break-all;
            box-sizing: border-box;
        }

        /* 輪值名單高亮背景 */
        .bg-duty {
            background-color: #292929;
        }
        
        /* 名字旁的次數數字微調 */
        .count-badge {
            color: #f39c12;
            font-weight: bold;
            margin-left: 4px;
            font-size: 13px;
        }

        /* 專屬行動裝置的 RWD 媒體查詢優化 (平板、手機防溢出切邊) */
        @media screen and (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 12px; }
            
            .matrix-table th {
                font-size: 13px;
                padding: 8px 2px;
            }
            .matrix-table td {
                font-size: 12px; /* 自動微調字體大小，確保手機排版不跑位 */
                padding: 10px 2px; /* 壓縮左右內距，騰出寬度空間 */
            }
            .count-badge {
                font-size: 11px;
                margin-left: 2px;
            }
        }

        /* ==========================================================================
           6. 研習明細表格與圖片圓形化圖示
           ========================================================================== */
        .detail-table {
            width: 100%;
            border-collapse: collapse;
            background-color: #242424;
            border-radius: 8px;
            overflow: hidden;
        }

        .detail-table th {
            background-color: #2d2d2d;
            color: #888888;
            padding: 12px;
            font-size: 14px;
        }

        .detail-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #2d2d2d;
            font-size: 14px;
            vertical-align: middle;
        }

        .text-green { color: #2ecc71; font-weight: bold; }

        /* 圖片圓形小圖示樣式 */
        .doc-thumbnail {
            width: 45px;
            height: 45px;
            border-radius: 50%; /* 完美圓形 */
            object-fit: cover;
            border: 2px solid #444;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s;
            display: inline-block;
            vertical-align: middle;
            margin: 2px;
        }

        /* 滑鼠懸停時放大檢視效果 */
        .doc-thumbnail:hover {
            transform: scale(2.5);
            border-color: #3498db;
            z-index: 10;
            position: relative;
            border-radius: 4px; /* 放大時轉為方型看得更清楚 */
        }

        .no-doc {
            color: #666666;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-title">115學年度</div>
        
        <div id="syncIndicator" class="sync-status sync-loading">正在同步雲端資料庫...</div>

        <div class="tab-system">
            <button class="tab-btn active" onclick="switchMainTab('all')">全體總覽</button>
            <button class="tab-btn" onclick="switchMainTab('personal')">個人紀錄</button>
        </div>

        <div id="pageAll" class="page-content active">
            <div class="section-title">全體人員摘要</div>
            <table class="main-table">
                <thead>
                    <tr>
                        <th style="width: 15%;">序號</th>
                        <th style="width: 25%;">姓名</th>
                        <th style="width: 35%;">研習總次數</th>
                        <th style="width: 25%;">操作</th>
                    </tr>
                </thead>
                <tbody id="allTeacherRows">
                    </tbody>
            </table>
        </div>

        <div id="pagePersonal" class="page-content">
            <div class="select-container">
                <label>請選擇教師：</label>
                <select id="teacherSelect" class="select-input" onchange="loadTeacherData()">
                    </select>
            </div>

            <div class="sub-tab-container">
                <button id="subTabStudy" class="sub-tab-btn active" data-type="study" onclick="switchSubTab('study')">📘 研習紀錄</button>
                <button id="subTabExam" class="sub-tab-btn active" data-type="exam" onclick="switchSubTab('exam')">📝 段考命題</button>
            </div>

            <div class="mini-summary-row">
                <div class="mini-card">
                    <div id="cardNameLabel" class="label">研習人員</div>
                    <div id="cardTeacherName" class="value">--</div>
                </div>
                <div class="mini-card" id="cardLeftBox">
                    <div class="label">去年累計</div>
                    <div id="cardLeftValue" class="value text-blue">--</div>
                </div>
                <div class="mini-card" id="cardRightBox">
                    <div class="label">今年新增</div>
                    <div id="cardRightValue" class="value text-orange">--</div>
                </div>
                <div class="mini-card">
                    <div class="label">總次數</div>
                    <div id="cardTotalValue" class="value" style="color: #f1c40f;">--</div>
                </div>
            </div>

            <div id="subContentStudy" style="display: block;">
                <div class="section-title" id="studyDetailTitle">今年研習明細</div>
                <table class="detail-table">
                    <thead>
                        <tr>
                            <th>研習日期</th>
                            <th>研習天數</th>
                            <th>研習時數</th>
                            <th>採計次數</th>
                            <th>研習公文</th>
                            <th>研習結果</th>
                        </tr>
                    </thead>
                    <tbody id="studyDetailRows">
                        </tbody>
                </table>
            </div>

            <div id="subContentExam" style="display: none;">
                <div class="phase-btn-group">
                    <button class="phase-btn active" onclick="switchPhase(1, '111 ~ 115年')">111 ~ 115年</button>
                    <button class="phase-btn" onclick="switchPhase(2, '116 ~ 120年')">116 ~ 120年</button>
                    <button class="phase-btn" onclick="switchPhase(3, '121 ~ 125年')">121 ~ 125年</button>
                </div>

                <div class="matrix-wrapper">
                    <div id="matrixTitleText" class="matrix-title">第一階段：111年 ~ 115年 命題輪值 (每年2位負責)</div>
                    <table class="matrix-table">
                        <thead id="matrixHead">
                            </thead>
                        <tbody id="matrixBody">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        // 模擬完整資料庫架構
        const database = {
            teachers: [
                { id: 1, name: "李〇", code: "職碼 1" },
                { id: 2, name: "張〇", code: "職碼 2" },
                { id: 3, name: "盧〇", code: "職碼 3" },
                { id: 4, name: "蘭〇", code: "職碼 4" },
                { id: 5, name: "曹〇", code: "職碼 5" }
            ],
            studySummary: {
                1: { lastYear: 8, thisYear: 4, total: 12 },
                2: { lastYear: 6, thisYear: 6, total: 12 },
                3: { lastYear: 14, thisYear: 5, total: 19 },
                4: { lastYear: 9, thisYear: 4, total: 13 },
                5: { lastYear: 7, thisYear: 6, total: 13 }
            },
            examSummary: {
                1: { lastYear: 20, thisYear: 4, total: 24 },
                2: { lastYear: 20, thisYear: 4, total: 24 },
                3: { lastYear: 20, thisYear: 4, total: 24 },
                4: { lastYear: 20, thisYear: 4, total: 24 },
                5: { lastYear: 20, thisYear: 4, total: 24 }
            },
            studyDetails: {
                5: [
                    { date: "114/08/18", days: "1日", hours: "6hr", count: "+2 次", doc: "https://picsum.photos/200/150?random=1", result: "https://picsum.photos/300/100?random=2" },
                    { date: "114/11/26", days: "1日", hours: "6hr", count: "+2 次", doc: "https://picsum.photos/200/150?random=3", result: "https://picsum.photos/300/100?random=4" },
                    { date: "114/06/18", days: "1日", hours: "6hr", count: "+2 次", doc: "https://picsum.photos/200/150?random=5", result: "" }
                ]
            },
            // 命題矩陣資料庫
            examMatrix: {
                1: {
                    years: ["111 年", "112 年", "113 年", "114 年", "115 年"],
                    rows: [
                        [ {name:"盧〇", score:4}, {name:"蘭〇", score:4}, {name:"張〇", score:4}, {name:"李〇", score:4}, {name:"曹〇", score:4} ],
                        [ {name:"李〇", score:4}, {name:"曹〇", score:4}, {name:"盧〇", score:4}, {name:"蘭〇", score:4}, {name:"張〇", score:4} ],
                        [ {name:"蘭〇", score:3}, {name:"張〇", score:3}, {name:"李〇", score:3}, {name:"曹〇", score:3}, {name:"盧〇", score:3} ],
                        [ {name:"曹〇", score:3}, {name:"盧〇", score:3}, {name:"蘭〇", score:3}, {name:"張〇", score:3}, {name:"李〇", score:3} ],
                        [ {name:"張〇", score:3}, {name:"李〇", score:3}, {name:"曹〇", score:3}, {name:"盧〇", score:3}, {name:"蘭〇", score:3} ]
                    ]
                },
                2: {
                    years: ["116 年", "117 年", "118 年", "119 年", "120 年"],
                    rows: [
                        [ {name:"盧〇", score:4}, {name:"蘭〇", score:4}, {name:"張〇", score:4}, {name:"李〇", score:4}, {name:"曹〇", score:4} ],
                        [ {name:"李〇", score:4}, {name:"曹〇", score:4}, {name:"盧〇", score:4}, {name:"蘭〇", score:4}, {name:"張〇", score:4} ],
                        [ {name:"蘭〇", score:3}, {name:"張〇", score:3}, {name:"李〇", score:3}, {name:"曹〇", score:3}, {name:"盧〇", score:3} ],
                        [ {name:"曹〇", score:3}, {name:"盧〇", score:3}, {name:"蘭〇", score:3}, {name:"張〇", score:3}, {name:"李〇", score:3} ],
                        [ {name:"張〇", score:3}, {name:"李〇", score:3}, {name:"曹〇", score:3}, {name:"盧〇", score:3}, {name:"蘭〇", score:3} ]
                    ]
                },
                3: {
                    years: ["121 年", "122 年", "123 年", "124 年", "125 年"],
                    rows: [
                        [ {name:"盧〇", score:4}, {name:"蘭〇", score:4}, {name:"張〇", score:4}, {name:"李〇", score:4}, {name:"曹〇", score:4} ],
                        [ {name:"李〇", score:4}, {name:"曹〇", score:4}, {name:"盧〇", score:4}, {name:"蘭〇", score:4}, {name:"張〇", score:4} ],
                        [ {name:"蘭〇", score:3}, {name:"張〇", score:3}, {name:"李〇", score:3}, {name:"曹〇", score:3}, {name:"盧〇", score:3} ],
                        [ {name:"曹〇", score:3}, {name:"盧〇", score:3}, {name:"蘭〇", score:3}, {name:"張〇", score:3}, {name:"李〇", score:3} ],
                        [ {name:"張〇", score:3}, {name:"李〇", score:3}, {name:"曹〇", score:3}, {name:"盧〇", score:3}, {name:"蘭〇", score:3} ]
                    ]
                }
            }
        };

        let currentSubTab = "study"; // 預設子頁面
        let currentPhase = 1;        // 預設五年一期階段

        // 頁面初始化
        window.addEventListener('DOMContentLoaded', () => {
            // 模擬異步雲端同步，1秒後完成切換狀態
            setTimeout(() => {
                const sync = document.getElementById('syncIndicator');
                sync.innerText = "成功同步雲端資料... ";
                sync.className = "sync-status sync-success";
            }, 1000);

            renderAllTeacherTable();
            populateSelectOptions();
            loadTeacherData();
        });

        // 切換主頁面 (全體總覽 / 個人紀錄)
        function switchMainTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('pageAll').classList.remove('active');
            document.getElementById('pagePersonal').classList.remove('active');

            if(tab === 'all') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('pageAll').classList.add('add', 'active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('pagePersonal').classList.add('active');
            }
        }

        // 渲染全體總覽表格 (已確實移除了「111~125總命題」欄位)
        function renderAllTeacherTable() {
            const tbody = document.getElementById('allTeacherRows');
            tbody.innerHTML = "";
            database.teachers.forEach((teacher, index) => {
                const summary = database.studySummary[teacher.id];
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${teacher.name}</td>
                    <td>${summary.total} 次</td>
                    <td><button class="btn-view" onclick="viewTeacherRecord(${teacher.id})">檢視</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 填充下拉選單
        function populateSelectOptions() {
            const select = document.getElementById('teacherSelect');
            select.innerHTML = "";
            database.teachers.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.id;
                opt.innerText = `${t.code} - ${t.name}`;
                select.appendChild(opt);
            });
        }

        // 當點擊全體總覽的「檢視」按鈕
        function viewTeacherRecord(id) {
            document.getElementById('teacherSelect').value = id;
            switchMainTab('personal');
            loadTeacherData();
        }

        // 切換子頁面 (研習紀錄 / 段考命題)
        function switchSubTab(type) {
            currentSubTab = type;
            document.getElementById('subTabStudy').classList.remove('active');
            document.getElementById('subTabExam').classList.remove('active');
            
            if(type === 'study') {
                document.getElementById('subTabStudy').classList.add('active');
                document.getElementById('subContentStudy').style.display = 'block';
                document.getElementById('subContentExam').style.display = 'none';
            } else {
                document.getElementById('subTabExam').classList.add('active');
                document.getElementById('subContentStudy').style.display = 'none';
                document.getElementById('subContentExam').style.display = 'block';
            }
            loadTeacherData();
        }

        // 加載選定教師的關聯數據
        function loadTeacherData() {
            const teacherId = document.getElementById('teacherSelect').value;
            const teacher = database.teachers.find(t => t.id == teacherId);
            if(!teacher) return;

            // 填寫核心迷你卡片
            document.getElementById('cardTeacherName').innerText = teacher.name;

            if(currentSubTab === "study") {
                // 研習模式：顯示 去年累計 與 今年新增
                document.getElementById('cardNameLabel').innerText = "研習人員";
                document.getElementById('cardLeftBox').style.display = "block";
                document.getElementById('cardRightBox').style.display = "block";
                document.getElementById('cardLeftBox').querySelector('.label').innerText = "去年累計";
                document.getElementById('cardRightBox').querySelector('.label').innerText = "今年新增";
                
                const studyData = database.studySummary[teacherId];
                document.getElementById('cardLeftValue').innerText = studyData.lastYear + "次";
                document.getElementById('cardRightValue').innerText = "+" + studyData.thisYear + "次";
                document.getElementById('cardTotalValue').innerText = studyData.total;

                // 載入研習細節與圓形小圖示
                renderStudyDetails(teacherId);
            } else {
                // 命題模式：隱藏去年累計與今年新增，保持介面最簡化
                document.getElementById('cardNameLabel').innerText = "命題人員";
                document.getElementById('cardLeftBox').style.style.display = "none";
                document.getElementById('cardRightBox').style.display = "none";
                
                const examData = database.examSummary[teacherId];
                document.getElementById('cardTotalValue').innerText = examData.total;

                // 載入響應式對照表
                renderMatrixTable();
            }
        }

        // 渲染研習細節與圓形小圖示
        function renderStudyDetails(teacherId) {
            const tbody = document.getElementById('studyDetailRows');
            tbody.innerHTML = "";
            
            const list = database.studyDetails[teacherId] || database.studyDetails[5]; // 若無資料則拿曹〇的當作範例展示
            
            list.forEach(item => {
                const tr = document.createElement('tr');
                
                const docHtml = item.doc ? `<img src="${item.doc}" class="doc-thumbnail" alt="公文">` : `<span class="no-doc">---</span>`;
                const resultHtml = item.result ? `<img src="${item.result}" class="doc-thumbnail" alt="結果">` : `<span class="no-doc">---</span>`;
                
                tr.innerHTML = `
                    <td><strong>${item.date}</strong></td>
                    <td>${item.days}</td>
                    <td>${item.hours}</td>
                    <td class="text-green">${item.count}</td>
                    <td>${docHtml}</td>
                    <td>${resultHtml}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 切換輪值對照表的五年階段
        function switchPhase(phaseNum, phaseText) {
            currentPhase = phaseNum;
            document.querySelectorAll('.phase-btn').forEach((btn, idx) => {
                if(idx === phaseNum - 1) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            
            const prefix = phaseNum === 1 ? "第一階段" : phaseNum === 2 ? "第二階段" : "第三階段";
            document.getElementById('matrixTitleText').innerText = `${prefix}：${phaseText} 命題輪值 (每年2位負責)`;
            renderMatrixTable();
        }

        // 渲染命題輪值矩陣 (高度 RWD 優化版本)
        function renderMatrixTable() {
            const head = document.getElementById('matrixHead');
            const body = document.getElementById('matrixBody');
            
            const matrixData = database.examMatrix[currentPhase];
            
            // 1. 生成表頭
            let headHtml = "<tr>";
            matrixData.years.forEach(year => {
                headHtml += `<th>${year}</th>`;
            });
            headHtml += "</tr>";
            head.innerHTML = headHtml;

            // 2. 生成對照內容
            let bodyHtml = "";
            matrixData.rows.forEach((row, rowIndex) => {
                // 前兩列為當年度負責人，加上背景高亮
                const isDutyRow = rowIndex < 2; 
                bodyHtml += `<tr class="${isDutyRow ? 'bg-duty' : ''}">`;
                
                row.forEach(cell => {
                    bodyHtml += `
                        <td>
                            ${cell.name}<span class="count-badge">${cell.score}</span>
                        </td>
                    `;
                });
                bodyHtml += "</tr>";
            });
            body.innerHTML = bodyHtml;
        }
    </script>
</body>
</html>
